// 关闭弹窗时停止音乐
function closeBanner() {
  document.getElementById('rd-banner').style.display = 'none';
  var audio = document.getElementById('rd-audio');
  if (audio) { audio.pause(); audio.currentTime = 0; }
}

function toggleBannerMusic() {
  var audio = document.getElementById('rd-audio');
  var btn = document.getElementById('rd-music-btn');
  if (!audio) return;
  if (audio.paused) {
    audio.volume = 0.5;
    audio.play();
    btn.textContent = '🔇 关闭音乐';
    btn.style.background = 'rgba(201,168,76,0.2)';
  } else {
    audio.pause();
    audio.currentTime = 0;
    btn.textContent = '🔊 播放欢庆音乐';
    btn.style.background = 'rgba(255,255,255,0.1)';
  }
}

        <!-- JS 幻灯片控制 -->
    <script>
    (function() {
      var SLIDE_DURATION = 10000;
      var LAST_DURATION  = 10000;
      var currentSlide = 0;
      var slides = [];
      var timer = null;

      function init() {
        slides = Array.from(document.querySelectorAll('#rd-banner-inner .rd-slide'));
        if (!slides.length) return;
        slides.forEach(function(s,i){ s.style.opacity = i===0?'1':'0'; });
        currentSlide = 0;
        scheduleNext();
      }

      function scheduleNext() {
        var isLast = (currentSlide === slides.length - 1);
        timer = setTimeout(function() {
          if (isLast) {
            showButtons();
          } else {
            goTo(currentSlide + 1);
            scheduleNext();
          }
        }, isLast ? LAST_DURATION : SLIDE_DURATION);
      }

      function goTo(idx) {
        slides[currentSlide].style.opacity = '0';
        currentSlide = idx;
        slides[currentSlide].style.opacity = '1';
      }

      function showButtons() {
        var r = document.getElementById('rd-replay-btn');
        var e = document.querySelector('.rd-enter-btn');
        if (r) r.style.display = 'inline-block';
        if (e) e.style.display  = 'inline-block';
      }

      function hideButtons() {
        var r = document.getElementById('rd-replay-btn');
        var e = document.querySelector('.rd-enter-btn');
        if (r) r.style.display = 'none';
        if (e) e.style.display  = 'none';
      }

      window.replayBannerSlideshow = function() {
        if (timer) { clearTimeout(timer); timer = null; }
        hideButtons();
        goTo(0);
        scheduleNext();
      };

      setTimeout(init, 400);
    })();
    </script>

<!-- 烟火Canvas - 星形+瀑布+双层混合 -->
<canvas id="rd-fireworks" style="position:absolute; inset:0; width:100%; height:100%; z-index:4; pointer-events:none;"></canvas>
<script>
(function() {
  var canvas = document.getElementById('rd-fireworks');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var particles = [];
  var rockets = [];

  function resize() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
  resize();
  window.addEventListener('resize', resize);
  function rand(min, max) { return Math.random() * (max - min) + min; }

  var colors = ['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#FFA07A','#F7DC6F','#BB8FCE','#82E0AA','#ffffff','#FFB6C1'];

  function drawStar(cx, cy, spikes, outerR, innerR, color, alpha) {
    ctx.save(); ctx.globalAlpha = alpha; ctx.beginPath();
    var rot = -Math.PI / 2, step = Math.PI / spikes;
    ctx.moveTo(cx, cy - outerR);
    for (var i = 0; i < spikes; i++) {
      ctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR); rot += step;
      ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR); rot += step;
    }
    ctx.closePath(); ctx.fillStyle = color; ctx.fill(); ctx.restore();
  }

  function createRocket() {
    var types = ['star', 'waterfall', 'double'];
    rockets.push({
      x: rand(canvas.width * 0.15, canvas.width * 0.85),
      y: canvas.height,
      vx: rand(-0.5, 0.5), vy: rand(-18, -14),
      color: colors[Math.floor(rand(0, colors.length))],
      type: types[Math.floor(rand(0, 3))]
    });
  }

  // 星形爆炸
  function explodeStar(x, y, color) {
    for (var arm = 0; arm < 5; arm++) {
      var base = (Math.PI * 2 / 5) * arm - Math.PI / 2;
      for (var k = 0; k < 12; k++) {
        var angle = base + rand(-0.15, 0.15), speed = rand(3, 7);
        particles.push({ x:x, y:y, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed,
          alpha:1, color:color, size:rand(3,6), spikes:5, gravity:0.07, type:'star' });
      }
    }
    for (var i = 0; i < 15; i++) {
      var a = rand(0, Math.PI*2);
      particles.push({ x:x, y:y, vx:Math.cos(a)*rand(1,3), vy:Math.sin(a)*rand(1,3),
        alpha:1, color:'#ffffff', size:rand(2,3.5), spikes:4, gravity:0.05, type:'star' });
    }
  }

  // 瀑布型
  function explodeWaterfall(x, y, color) {
    for (var i = 0; i < 100; i++) {
      var angle = rand(-Math.PI*0.8, -Math.PI*0.2), speed = rand(2, 8);
      particles.push({ x:x, y:y, vx:Math.cos(angle)*speed*rand(0.5,1.5), vy:Math.sin(angle)*speed,
        alpha:1, color:color, size:rand(1.5,3), gravity:rand(0.1,0.18), type:'dot' });
    }
  }

  // 双层爆炸
  function explodeDouble(x, y, color) {
    var color2 = colors[Math.floor(rand(0, colors.length))];
    // 外层大圆
    for (var i = 0; i < 60; i++) {
      var angle = (Math.PI * 2 / 60) * i, speed = rand(5, 9);
      particles.push({ x:x, y:y, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed,
        alpha:1, color:color, size:rand(2,4), spikes:5, gravity:0.06, type:'star' });
    }
    // 内层小圆（延迟爆炸模拟：速度慢一半）
    for (var j = 0; j < 40; j++) {
      var a2 = (Math.PI * 2 / 40) * j, s2 = rand(2, 4);
      particles.push({ x:x, y:y, vx:Math.cos(a2)*s2, vy:Math.sin(a2)*s2,
        alpha:1, color:color2, size:rand(3,5), spikes:6, gravity:0.05, type:'star' });
    }
    // 中心闪光
    for (var k = 0; k < 20; k++) {
      var ak = rand(0, Math.PI*2);
      particles.push({ x:x, y:y, vx:Math.cos(ak)*rand(0.5,2), vy:Math.sin(ak)*rand(0.5,2),
        alpha:1, color:'#ffffff', size:rand(2,4), spikes:4, gravity:0.03, type:'star' });
    }
  }

  var frameCount = 0;
  function animate() {
    var banner = document.getElementById('rd-banner');
    if (!banner || banner.style.display === 'none') return;
    requestAnimationFrame(animate);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frameCount++;
    if (frameCount % 180 === 0) createRocket();

    for (var i = rockets.length - 1; i >= 0; i--) {
      var r = rockets[i];
      r.x += r.vx; r.y += r.vy; r.vy += 0.3;
      ctx.globalAlpha = 0.9;
      ctx.beginPath(); ctx.arc(r.x, r.y, 3, 0, Math.PI*2);
      ctx.fillStyle = r.color; ctx.fill(); ctx.globalAlpha = 1;
      if (r.vy >= -2) {
        if (r.type === 'star') explodeStar(r.x, r.y, r.color);
        else if (r.type === 'waterfall') explodeWaterfall(r.x, r.y, r.color);
        else explodeDouble(r.x, r.y, r.color);
        rockets.splice(i, 1);
      }
    }

    for (var j = particles.length - 1; j >= 0; j--) {
      var p = particles[j];
      p.x += p.vx; p.y += p.vy; p.vy += p.gravity; p.vx *= 0.98; p.alpha -= 0.016;
      if (p.alpha <= 0) { particles.splice(j, 1); continue; }
      if (p.type === 'star') {
        drawStar(p.x, p.y, p.spikes, p.size, p.size*0.45, p.color, p.alpha);
      } else {
        ctx.globalAlpha = p.alpha;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        ctx.fillStyle = p.color; ctx.fill(); ctx.globalAlpha = 1;
      }
    }
    ctx.globalAlpha = 1;
  }

  setTimeout(function() { resize(); createRocket(); animate(); }, 300);
})();
</script>
