<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>扯谈GPT · 扯谈Duke家长群</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F1E7;
    --ink:#2B2620;
    --navy:#0A2240;
    --gold:#C8A35A;
    --bubble-bot:#FFFFFF;
    --bubble-user:#0A2240;
    --border:#E3DACB;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{
    font-family:'Noto Sans SC', sans-serif;
    background:var(--paper);
    color:var(--ink);
    display:flex; flex-direction:column;
    height:100vh;
    height:100dvh;
    overflow:hidden;
  }

  /* ── 顶栏 ── */
  header{
    background:var(--navy);
    color:#fff;
    padding:14px 18px;
    display:flex; align-items:center; gap:12px;
    box-shadow:0 2px 8px rgba(10,34,64,.15);
    flex-shrink:0;
  }
  .avatar{
    width:40px; height:40px; border-radius:50%;
    background:var(--gold);
    display:flex; align-items:center; justify-content:center;
    font-size:20px; flex-shrink:0;
  }
  header .title{
    font-family:'Noto Serif SC', serif;
    font-size:18px; font-weight:700; letter-spacing:1px;
  }
  header .subtitle{
    font-size:11px; opacity:.65; margin-top:2px;
  }

  /* ── 消息区 ── */
  #chat{
    flex:1 1 auto;
    min-height:0;
    overflow-y:auto;
    padding:16px;
    display:flex; flex-direction:column; gap:12px;
  }
  .msg{
    max-width:78%;
    padding:10px 14px;
    border-radius:14px;
    font-size:14.5px;
    line-height:1.6;
    white-space:pre-wrap;
    word-break:break-word;
    box-shadow:0 1px 2px rgba(0,0,0,.04);
  }
  .msg.bot{
    align-self:flex-start;
    background:var(--bubble-bot);
    border:1px solid var(--border);
    border-top-left-radius:4px;
  }
  .msg.user{
    align-self:flex-end;
    background:var(--bubble-user);
    color:#fff;
    border-top-right-radius:4px;
  }
  .msg.bot::before{
    content:"扯谈助手";
    display:block;
    font-size:11px;
    font-weight:700;
    color:var(--gold);
    margin-bottom:4px;
    letter-spacing:1px;
  }
  .msg.typing{
    color:#999; font-style:italic;
  }
  .msg.error{
    background:#fdecea; color:#b3261e; border:1px solid #f5c2bd;
  }

  /* ── 欢迎语 ── */
  .welcome{
    text-align:center;
    color:#8a7f6c;
    font-size:13px;
    padding:24px 20px 8px;
    line-height:1.8;
  }
  .welcome b{ color:var(--navy); }
  .chips{
    display:flex; flex-wrap:wrap; gap:8px;
    justify-content:center;
    padding:8px 16px 16px;
  }
  .chip{
    background:#fff;
    border:1px solid var(--border);
    border-radius:20px;
    padding:6px 14px;
    font-size:12.5px;
    cursor:pointer;
    color:var(--navy);
    transition:background .15s;
  }
  .chip:active{ background:var(--paper); }

  /* ── 输入栏 ── */
  #inputBar{
    flex:0 0 auto;
    display:flex; gap:8px;
    padding:10px 12px;
    padding-bottom:max(10px, env(safe-area-inset-bottom));
    background:#fff;
    border-top:1px solid var(--border);
  }
  #inputBar textarea{
    flex:1;
    resize:none;
    border:1px solid var(--border);
    border-radius:18px;
    padding:10px 16px;
    font-size:14.5px;
    font-family:inherit;
    line-height:1.4;
    max-height:96px;
    outline:none;
  }
  #inputBar textarea:focus{ border-color:var(--gold); }
  #sendBtn{
    flex-shrink:0;
    width:44px; height:44px;
    border-radius:50%;
    border:none;
    background:var(--navy);
    color:#fff;
    font-size:18px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:opacity .15s;
  }
  #sendBtn:disabled{ opacity:.4; cursor:default; }

  /* ── 滚动条 ── */
  #chat::-webkit-scrollbar{ width:4px; }
  #chat::-webkit-scrollbar-thumb{ background:var(--border); border-radius:2px; }
</style>
</head>
<body>

<header>
  <div class="avatar">🦢</div>
  <div>
    <div class="title">扯谈GPT</div>
    <div class="subtitle">扯谈Duke家长群 · 扯谈助手在线</div>
  </div>
</header>

<div id="chat">
  <div class="welcome">
    哈喽哈喽～我是<b>扯谈助手</b>，在群里泡了好几年的老家长。<br>
    录取流程、Durham吃喝住、选课闲聊都能跟我唠唠，<br>
    官方信息记得还是找管理员核实哈 😄
  </div>
  <div class="chips">
    <div class="chip" onclick="ask('录取信什么时候能批准？')">录取信多久能批准？</div>
    <div class="chip" onclick="ask('Durham附近租房怎么样？')">Durham租房怎么样？</div>
    <div class="chip" onclick="ask('Duke的CS和ECE有什么区别？')">CS和ECE区别？</div>
    <div class="chip" onclick="ask('开学前应该准备什么？')">开学前要准备啥？</div>
  </div>
</div>

<div id="inputBar">
  <textarea id="input" rows="1" placeholder="跟扯谈助手唠两句…" onkeydown="onKeyDown(event)" oninput="autoGrow(this)"></textarea>
  <button id="sendBtn" onclick="send()">➤</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://ritglkwqpwlcjwemhfqd.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJpdGdsa3dxcHdsY2p3ZW1oZnFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MzEyMTQsImV4cCI6MjA4NzMwNzIxNH0.TqjETAEGcWTd2CbvkMnmfm6bKHLtZHjXbsy3dtPuEB8';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const PROXY_URL = 'https://ritglkwqpwlcjwemhfqd.supabase.co/functions/v1/ai-proxy';

// ── 人设 system prompt ──
const SYSTEM_PROMPT = `你是"扯谈Duke家长群"里的一位资深群友，群友们都叫你"扯谈助手"。你不是冷冰冰的AI助手，而是一个混迹群里很久、对Duke 2030届各种事情都门儿清的"老家长"。

性格与语气：
- 说话像中国家长群里聊天，亲切、接地气，偶尔带点调侃和自嘲
- 常用语气词如"哈哈""真的嘛""我家娃也是这样""说句实话啊"
- 对鸡娃话题有分寸感：能聊学区房、AP课、申研内卷，也会适时说"孩子开心最重要，别太卷"
- 回答尽量简短口语化，不要列大段官方条款

边界：
- 不冒充任何具体真人家长或管理员
- 遇到无法确定的官方流程信息（比如录取审核进度、个人账号问题），建议"这个得问群里管理员哈，我也不是百事通"
- 不提供医疗、法律、签证等专业建议，引导去正规渠道
- 始终用中文回复`;

let history = []; // {role:'user'|'model', text}

function autoGrow(el){
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 96) + 'px';
}

function onKeyDown(e){
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

function appendMsg(role, text){
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function ask(text){
  document.getElementById('input').value = text;
  send();
}

async function send(){
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  // 隐藏欢迎语
  const welcome = document.querySelector('.welcome');
  const chips = document.querySelector('.chips');
  if (welcome) welcome.remove();
  if (chips) chips.remove();

  appendMsg('user', text);
  input.value = '';
  autoGrow(input);

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;

  const typingEl = appendMsg('bot typing', '扯谈助手正在码字…');

  try {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.pathname);
      return;
    }

    // 拼接历史对话为单一prompt（ai-proxy当前只支持单条prompt）
    let fullPrompt = SYSTEM_PROMPT + '\n\n以下是对话记录：\n';
    for (const h of history) {
      fullPrompt += (h.role === 'user' ? '家长' : '扯谈助手') + '：' + h.text + '\n';
    }
    fullPrompt += '家长：' + text + '\n扯谈助手：';

    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
      body: JSON.stringify({ provider: 'gemini', prompt: fullPrompt, useSearch: true })
    });
    const d = await res.json();
    if (!d.ok) throw new Error(d.error || '请求失败');

    typingEl.remove();
    appendMsg('bot', d.result.trim());

    history.push({ role:'user', text });
    history.push({ role:'model', text: d.result.trim() });
    // 限制历史长度，避免prompt过长
    if (history.length > 20) history = history.slice(-20);

  } catch(e) {
    typingEl.remove();
    appendMsg('bot error', '❌ 出错了：' + e.message);
  } finally {
    btn.disabled = false;
    input.focus();
  }
}
</script>
</body>
</html>
