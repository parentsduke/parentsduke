<script>
// ===== IMAGE / VIDEO OVERLAY =====
// openOverlay/closeOverlay defined here in <head> so onclick attributes work immediately

function openOverlay(src, alt) {
  var overlay = document.getElementById("overlay");
  var overlayImg = document.getElementById("overlay-img");
  overlayImg.src = src;
  overlayImg.alt = alt || "放大图片";
  overlay.style.display = "flex";
}

function closeOverlay() {
  var overlay = document.getElementById("overlay");
  if (overlay) overlay.style.display = "none";
}

// All close handlers use event delegation on document — safe to run in <head>
document.addEventListener("click", function(e) {
  // 点击overlay背景关闭图片放大
  if (e.target && e.target.id === "overlay") {
    closeOverlay();
  }
  // 点击video-overlay背景关闭视频
  if (e.target && e.target.id === "video-overlay") {
    var overlayVideo = document.getElementById("overlay-video");
    if (overlayVideo) { overlayVideo.pause(); overlayVideo.src = ""; }
    e.target.style.display = "none";
  }
});

// 按 Escape 关闭
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") {
    closeOverlay();
    var overlayVideo = document.getElementById("overlay-video");
    if (overlayVideo) { overlayVideo.pause(); overlayVideo.src = ""; }
    var vo = document.getElementById("video-overlay");
    if (vo) vo.style.display = "none";
  }
});
</script>

          <details class="qa-card">
            <summary>Q2: 大一工学和文理学院的必修课是否一样？
                有哪些热门课需提前抢？
                大一选课策略。
                选宿舍和适配室友机制：选宿舍适配室友信息表格内容，什么时候提交，实际上学校会按所交表格信息进行匹配室友吗？
                可以自选室友吗?
                国际生VISA签证的银行资金证明具体要求?</summary>
            <p>具体专业课肯定不一样。比较热门的还是CS，Econ，Math等大课堂。选课策略一般建议循序渐进，特别是第一学期。可以选一门与以后所学专业有关的课程，其他的稍微轻松的人文需修课。室友不能自己直接互选，学校大概在五月底会发表格供学生填信息，但是也不用期望会完全匹配每个人的意愿，有时看上去就是随机组合的。存款证明不需要冻结，开资产证明就行，证明有付学费的能力。银行有格式化的存款证明，手机银行上就可以申请开具。</p>
          </details>

            <p>与工程相关的活动可能会是 Duke Aerospace engineering、Robotics。有Duke Club Tennis。Fraternities and sororities都是基于个人的兴趣，许多都已经脱离Duke正式的管理系统了。新生Convocation本身没有什么特别，如果家长仍旧在学校，可以去观看，但是学校不正式邀请家长们。</p>

            <p>除草课程基本是有机化学。Fraternities and sororities对pre-med track 学生没有作用。Health Professions Advising要很好地利用。杜克学生每学期有钱可以和老师吃饭聊天，每学期请老师吃饭，互相了解，有利于写推荐信。</p>
          </details>
          <details class="qa-card">
            <summary>Q10: 请问杜克的冰球队水平如何？大概是什么级别的?</summary>
            <p>一般水平，你家杜娃可能从小开始冰球训练和比赛，应该具备资格参加杜克冰球队，具体可以参考28届家长细雨的孩子情况。</p>
          </details>
          <details class="qa-card">
            <summary>Q11：申请Merit Scholarship奖学金需要什么条件？怎样申请？什么时候申请？</summary>
            <p>Duke学生，除了Robertson Scholarship外，其它的不用另外申请。Robertson Scholarship可以在第一学年中第二次申请，具体看其网页信息。</p>
          </details>
          <details class="qa-card">
            <summary>Q12-Tianluo：关于FOCUS和Constellations怎么选择？大多孩子选了哪个？体验是什么？觉得哪个更好？</summary>
            <p>Pre-med track 学生可能会选FOCUS，因为课程设置偏生物医学较多。FOCUS 的引人之处之一是大家可以住在一起。大多数跟着Constellations走。</p>
          </details>
          <details class="qa-card">
            <summary>Q13：关于work-study，都是什么样的工作？在校园里吗？工资rate是多少？怎么申请？孩子在繁忙的学习中是否可以再做work-study？</summary>
            <p>所有校园内的工作，包括图书馆、实验室、OIT部门、WU餐饮等等。现在最低工资每小时$16.50。学生自己在学校内部的Joblist上找。很多孩子都在做，也是平衡的学习吧。</p>
          </details>
          <details class="qa-card">
            <summary>Q14：关于Loan，在financial aid estimate里提到的Loan是否无息？毕业后才开始有利息？</summary>
            <p>The Federal Government，State Governments/State Agencies和Private Lenders。学校主要是The Federal Government loan，至于Direct Subsidized还是unsubsidized要看你的FASFA申请的结果。Subsidized四年学习期间家庭不用付利息。</p>

      var total = slides.length;

      if (!slides.length) return;

      // 创建圆点
      slides.forEach(function(_, i) {
        var dot = document.createElement("span");
        dot.className = "slide-dot" + (i === 0 ? " active" : "");
        dot.onclick = function() { goTo(i); resetAuto(); };
        dotsContainer.appendChild(dot);
      });

      function goTo(n) {
        slides[current].classList.remove("active");
        dotsContainer.children[current].classList.remove("active");
        current = (n + total) % total;
        slides[current].classList.add("active");
        dotsContainer.children[current].classList.add("active");
        counter.textContent = (current + 1) + " / " + total;

      main.querySelector(".slide-next").onclick = function() { goTo(current + 1); resetAuto(); };

      // 自动播放（4秒切换）
      function startAuto() {
        autoTimer = setInterval(function() { goTo(current + 1); }, 4000);
      }
      function resetAuto() {
        clearInterval(autoTimer);
        startAuto();
      }
      startAuto();

        pptToggle.setAttribute("aria-expanded", String(!isOpen));
      });

        const items = main.querySelectorAll(".link-list a, .link-list li");

          if (match && !firstMatch && keyword !== "") firstMatch = el;
        });

    display: block;
    padding: 6px 0 6px 32px;
    font-size: 18px;
    color: #000080;

  }

  .accordion-body li a:hover {
    color: #555;
    text-decoration: underline;
  }

  /* CSV 子分区 */
  .csv-sub-section {
    border-top: 1px solid #ddd;

  .csv-sub-section:first-child {

  .csv-sub-title {
    background: #e8eaf6;
    color: #000080;

    font-size: 15px;

  /* CSV 手风琴内容区 */

  /* ===== 登录/注册按钮 ===== */

  .video-gallery-thumbs {
    display: flex;
    gap: 0;

    flex-wrap: wrap;
  }

  .video-thumb {
    flex: 1;

    padding: 12px 10px;

    border-right: 1px solid #333;
    transition: background 0.2s;
  }

  .video-thumb:last-child { border-right: none; }

  .video-thumb:hover { background: #2a2a2a; }

  .video-thumb.active {
    background: #003366;
  }

  .video-thumb-icon {
    font-size: 22px;
    color: #fff;
    margin-bottom: 4px;
  }

  .video-thumb.active .video-thumb-icon {
    color: #7eb8f7;
  }

  .video-thumb-label {
    font-size: 12px;
    color: #aaa;
  }

  .video-thumb.active .video-thumb-label {
    color: #fff;
  }

  @media (max-width: 600px) {
    .video-gallery-player { max-height: 240px; }
    .video-thumb { padding: 8px 6px; }
    .video-thumb-label { font-size: 11px; }
  }

  /* ===== 轮播相册 ===== */
  .slideshow-container {
    position: relative;
    max-width: 700px;
    margin: 20px auto;
    border-radius: 10px;
    overflow: hidden;
    background: #000;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    user-select: none;
  }

  .slide {
    display: none;
    text-align: center;
  }

  .slide.active {
    display: block;
    animation: fadeSlide 0.5s ease;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: scale(0.97); }
    to   { opacity: 1; transform: scale(1); }
  }

  .slide img {
    width: 100%;
    max-height: 480px;
    object-fit: contain;
    cursor: zoom-in;
    display: block;
    margin: 0 auto;
    background: #000;
  }

  /* 左右箭头按钮 */
  .slide-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.45);
    color: #fff;
    border: none;
    padding: 12px 16px;
    font-size: 20px;
    cursor: pointer;
    border-radius: 4px;
    z-index: 10;
    transition: background 0.2s;
  }
  .slide-btn:hover { background: rgba(0,0,0,0.75); }
  .slide-prev { left: 8px; }
  .slide-next { right: 8px; }

  /* 圆点指示器 */
  .slide-dots {
    text-align: center;
    padding: 10px 0 6px;
    background: #000;
  }
  .slide-dot {
    display: inline-block;
    width: 9px;
    height: 9px;
    margin: 0 4px;
    background: #666;
    border-radius: 50%;
    cursor: pointer;
    transition: background 0.2s;
  }
  .slide-dot.active { background: #fff; }

  /* 计数器 */
  .slide-counter {
    text-align: center;
    color: #aaa;
    font-size: 12px;
    padding-bottom: 8px;
    background: #000;
  }

  /* 手机适配 */
  @media (max-width: 600px) {
    .slide img { max-height: 280px; }
    .slide-btn { padding: 8px 12px; font-size: 16px; }
  }
</style>

<script>
// ===== CSV 函数 =====
function renderCSV(csvText, tableId) {
  var rows = csvText.trim().split("\n");
  var table = document.getElementById(tableId);
  table.innerHTML = "";
  rows.forEach(function(row, i) {
    var tr = document.createElement("tr");
    row.split(",").forEach(function(cell) {
      var el = document.createElement(i === 0 ? "th" : "td");
      el.textContent = cell;
      tr.appendChild(el);
    });
    table.appendChild(tr);
  });
}

function loadCSV30() {
  var pwd = document.getElementById("csvPwd30").value;
  var err = document.getElementById("csvErr30");
  if (pwd !== "2030Duke") { err.textContent = "❌ 密码错误"; return; }
  fetch("class30.csv").then(function(r){ return r.text(); })
    .then(function(t){ renderCSV(t, "csvTable30"); })
    .catch(function(){ err.textContent = "❌ CSV 文件加载失败"; });
  err.textContent = "";
  document.getElementById("csv-password-box-30").style.display = "none";
  document.getElementById("csv-container-30").style.display = "block";
}

}

  err.textContent = "";
  document.getElementById("csv-password-box-25").style.display = "none";
  document.getElementById("csv-container-25").style.display = "block";

function closeCSV(year) {
  document.getElementById("csv-container-" + year).style.display = "none";
  document.getElementById("csv-password-box-" + year).style.display = "block";
  document.getElementById("csvPwd" + year).value = "";
}
</script>
