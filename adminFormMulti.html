<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>录取信息管理 · DukeParents</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy:   #001a4d;
      --blue:   #003087;
      --gold:   #B8963E;
      --gold-lt:#f5ecd4;
      --bg:     #f5f3ef;
      --card:   #ffffff;
      --border: #e2ddd6;
      --text:   #1a1a1a;
      --muted:  #888070;
      --red:    #C84B31;
      --green:  #1a6b3c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); font-family: 'Noto Serif SC', serif; color: var(--text); height: 100vh; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

    /* ── Header ── */
    header {
      background: var(--navy);
      border-bottom: 3px solid var(--gold);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .hd { font-size: 28px; font-weight: 900; color: var(--navy); letter-spacing: -1px; -webkit-text-stroke: 1.5px #ffffff; }
    .ht { font-size: 14px; color: rgba(255,255,255,0.7); font-weight: 600; }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .btn-logout {
      padding: 8px 16px;
      background: transparent;
      color: rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Noto Serif SC', serif;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.1); }

    /* ── Login ── */
    #loginScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 63px);
      padding: 40px 20px;
    }
    .login-card {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .login-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 8px;
      text-align: center;
    }
    .login-sub {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 32px;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Noto Serif SC', serif;
      background: #faf9f7;
      color: var(--text);
      outline: none;
    }
    .form-group input:focus { border-color: var(--blue); background: #fff; }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Noto Serif SC', serif;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-login:hover { background: var(--navy); }
    .btn-login:disabled { background: #aab4cc; cursor: not-allowed; }
    .login-error {
      margin-top: 16px;
      padding: 10px 14px;
      background: #fdecea;
      color: var(--red);
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    .login-error.show { display: block; }

    /* ── Admin Panel ── */
    #adminPanel { display: none; padding: 32px 24px 16px; flex: 1; overflow: hidden; flex-direction: column; min-height: 0; }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
    }
    .panel-title { font-size: 20px; font-weight: 700; color: var(--navy); }
    .panel-meta { font-size: 13px; color: var(--muted); }
    .btn-export {
      padding: 10px 20px;
      background: var(--gold);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Noto Serif SC', serif;
      cursor: pointer;
    }
    .btn-export:hover { background: #a07830; }

    /* ── Duty Banner ── */
    .duty-banner {
      background: #fff8e6;
      border: 1.5px solid var(--gold);
      border-radius: 10px;
      padding: 12px 20px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .duty-banner.no-duty {
      background: #fff0f0;
      border-color: #e08080;
    }
    .duty-info { display: flex; align-items: center; gap: 10px; }
    .duty-label { font-size: 12px; color: var(--muted); font-weight: 600; letter-spacing: 0.5px; }
    .duty-name { font-size: 18px; font-weight: 900; color: var(--navy); }
    .duty-week { font-size: 12px; color: var(--muted); }
    .duty-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-duty {
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      font-family: 'Noto Serif SC', serif;
      cursor: pointer;
      border: 1.5px solid var(--blue);
      background: transparent;
      color: var(--blue);
    }
    .btn-duty:hover { background: var(--blue); color: #fff; }
    .btn-duty.primary { background: var(--blue); color: #fff; }
    .btn-duty.primary:hover { background: #001a4d; }

    /* ── Duty Modal ── */
    .duty-modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .duty-modal-overlay.open { display: flex; }
    .duty-modal {
      background: #fff;
      border-radius: 14px;
      padding: 28px 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    }
    .duty-modal h3 { font-size: 17px; font-weight: 700; color: var(--navy); margin-bottom: 20px; }
    .officer-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .officer-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: #faf9f7;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .officer-row:hover { border-color: var(--blue); }
    .officer-row.selected { border-color: var(--blue); background: #eef3fb; }
    .officer-row .o-name { font-weight: 700; font-size: 15px; color: var(--navy); }
    .officer-row .o-email { font-size: 12px; color: var(--muted); }
    .officer-row .o-badge { font-size: 11px; background: var(--gold); color: #fff; padding: 2px 8px; border-radius: 10px; }
    .duty-modal-btns { display: flex; gap: 10px; justify-content: flex-end; }

    /* ── Filters ── */
    .filters {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filters select, .filters input {
      padding: 8px 12px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-family: 'Noto Serif SC', serif;
      background: #faf9f7;
      color: var(--text);
      outline: none;
    }
    .filters select:focus, .filters input:focus { border-color: var(--blue); }
    .filter-label { font-size: 13px; color: var(--muted); font-weight: 600; }

    /* ── Table ── */
    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow-x: scroll;
      overflow-y: scroll;
      flex: 1;
      min-height: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      scrollbar-width: thin;
      scrollbar-color: #c9a84c #f0f0f0;
    }
    .table-wrap::-webkit-scrollbar {
      height: 8px;
      width: 6px;
    }
    .table-wrap::-webkit-scrollbar-track {
      background: #f0f0f0;
      border-radius: 4px;
    }
    .table-wrap::-webkit-scrollbar-thumb {
      background: #c9a84c;
      border-radius: 4px;
    }
    tbody tr:last-child td {
      padding-bottom: 32px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 1260px;
    }
    thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--navy);
      color: #fff;
      padding: 12px 14px;
      text-align: left;
      font-weight: 600;
      font-size: 12px;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    thead th:hover { background: #002470; }
    thead th.sort-asc::after { content: ' ▲'; font-size: 10px; }
    thead th.sort-desc::after { content: ' ▼'; font-size: 10px; }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:hover { background: #faf9f7; }
    tbody tr:last-child { border-bottom: none; }
    tbody td { padding: 11px 14px; vertical-align: top; }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      font-family: 'DM Mono', monospace;
    }
    .tag-ed { background: #e8f0fe; color: #1a3c8f; }
    .tag-rd { background: #e8f5e9; color: #1a5c2a; }
    .tag-yes { background: #e8f5e9; color: #1a5c2a; }
    .tag-no  { background: #fdecea; color: #8b2a1a; }
    .tag-shelved { background: #fff3e0; color: #b45309; }
    .file-link {
      color: var(--blue);
      text-decoration: none;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .file-link:hover { text-decoration: underline; }
    .no-file { color: var(--muted); font-size: 12px; }
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--muted);
      font-size: 14px;
    }
    .empty {
      text-align: center;
      padding: 60px;
      color: var(--muted);
      font-size: 14px;
    }
    .user-email {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      font-family: 'DM Mono', monospace;
    }

    /* ── 人员标记列 ── */
    .person-select {
      appearance: none;
      -webkit-appearance: none;
      border: none;
      background: transparent;
      font-size: 16px;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      text-align: center;
      width: 36px;
    }
    .person-select:hover { background: rgba(0,0,0,0.06); }
    .person-select:focus { outline: 1px solid var(--blue); border-radius: 4px; }
    td.person-cell { text-align: center; padding: 8px 6px; }
    th.person-th { text-align: center; min-width: 48px; }

    /* ── Approve Modal ── */
    #resendModal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      align-items: center; justify-content: center; z-index: 1000;
    }
    #resendModal.show { display: flex; }
    #approveModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    #approveModal.show { display: flex; }
    .modal-box {
      background: #fff;
      border-radius: 14px;
      padding: 32px 28px 24px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    }
    .modal-title { font-size: 17px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
    .modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
    .modal-label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    #modalAdminSelect {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Noto Serif SC', serif;
      background: #faf9f7;
      color: var(--text);
      outline: none;
      margin-bottom: 20px;
    }
    #modalAdminSelect:focus { border-color: var(--blue); }
    .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
    .modal-btn-cancel {
      padding: 10px 20px; background: #fff; color: var(--muted);
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 13px; font-family: 'Noto Serif SC', serif; cursor: pointer;
    }
    .modal-btn-cancel:hover { background: #f5f3ef; }
    .modal-btn-confirm {
      padding: 10px 20px; background: #1a6b3c; color: #fff;
      border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
      font-family: 'Noto Serif SC', serif; cursor: pointer;
    }
    .modal-btn-confirm:hover { background: #145230; }
    .modal-btn-confirm:disabled { background: #aab4cc; cursor: not-allowed; }
    /* ── catalist 下拉操作菜单 ── */
    .catalist-wrap { position: relative; display: inline-block; }
    .catalist-menu {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      z-index: 100;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      min-width: 160px;
      overflow: hidden;
    }
    .catalist-menu.open { display: block; }
    .catalist-item {
      display: block;
      width: 100%;
      padding: 9px 14px;
      background: none;
      border: none;
      text-align: left;
      font-size: 12px;
      font-family: 'Noto Serif SC', serif;
      color: var(--text);
      cursor: pointer;
      white-space: nowrap;
    }
    .catalist-item:hover { background: var(--gold-lt); color: var(--navy); }
    .catalist-item + .catalist-item { border-top: 1px solid var(--border); }
    .catalist-status {
      display: block;
      padding: 7px 14px;
      font-size: 11px;
      font-weight: 600;
      font-family: 'DM Mono', monospace;
      border-bottom: 1px solid var(--border);
      pointer-events: none;
    }
  </style>
</head>
<body>

<!-- 重新发送管理员选择 Modal -->


<!-- 操作管理员选择 Modal (搁置/取消搁置/拒绝) -->
<div id="actionModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;align-items:center;justify-content:center;">
  <div class="modal-box">
    <div class="modal-title" id="actionModalTitle">操作确认</div>
    <div class="modal-sub" id="actionModalSubText"></div>
    <div class="modal-label">操作管理员</div>
    <select id="actionAdminSelect" onchange="document.getElementById('actionConfirmBtn').disabled=!this.value">
      <option value="">— 请选择 —</option>
      <option value="笑">笑</option>
      <option value="奕">奕</option>
      <option value="伟">伟</option>
      <option value="VON">VON</option>
      <option value="静">静</option>
      <option value="Sharon">Sharon</option>
    </select>
    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="closeActionModal()">取消</button>
      <button class="modal-btn-confirm" id="actionConfirmBtn" onclick="confirmAction()" disabled>确认</button>
    </div>
  </div>
</div>

<!-- 催信管理员选择 Modal -->
<div id="reminderModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;align-items:center;justify-content:center;">
  <div class="modal-box">
    <div class="modal-title">发送催信</div>
    <div class="modal-sub" id="reminderModalSubText"></div>
    <div class="modal-label">缺少的材料（可多选）</div>
    <div id="reminderMissingHint" style="font-size:12px;color:#888;margin-bottom:6px;"></div>
    <div id="reminderMissingItems" style="display:flex;flex-direction:column;gap:6px;margin:6px 0 10px;font-size:14px;">
      <label class="reminder-item-dorm"><input type="checkbox" value="宿舍照片" class="reminder-missing-cb"> 宿舍照片</label>
      <label class="reminder-item-cl"><input type="checkbox" value="Committed Letter" class="reminder-missing-cb"> Committed Letter</label>
      <label><input type="checkbox" value="录取通知书" class="reminder-missing-cb"> 录取通知书</label>
      <label><input type="checkbox" value="其他信息" class="reminder-missing-cb"> 其他信息（见备注）</label>
    </div>
    <div class="modal-label">备注 / 具体说明（选填）</div>
    <textarea id="reminderNote" placeholder="例如：照片模糊看不清宿舍门牌号，请重新拍摄" style="width:100%;min-height:60px;box-sizing:border-box;padding:8px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:14px;resize:vertical;"></textarea>
    <div class="modal-label">操作管理员</div>
    <select id="reminderAdminSelect" onchange="document.getElementById('reminderConfirmBtn').disabled=!this.value">
      <option value="">— 请选择 —</option>
      <option value="笑">笑</option>
      <option value="奕">奕</option>
      <option value="伟">伟</option>
      <option value="VON">VON</option>
      <option value="静">静</option>
      <option value="Sharon">Sharon</option>
    </select>
    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="closeReminderModal()">取消</button>
      <button class="modal-btn-confirm" id="reminderConfirmBtn" onclick="confirmReminder()" disabled>确认发送</button>
    </div>
  </div>
</div>

<div id="resendModal">
  <div class="modal-box">
    <div class="modal-title">重新发送入群链接</div>
    <div class="modal-sub" id="resendModalSubText"></div>
    <div class="modal-label">操作管理员</div>
    <select id="resendAdminSelect" onchange="document.getElementById('resendConfirmBtn').disabled=!this.value">
      <option value="">— 请选择 —</option>
      <option value="笑">笑</option>
      <option value="奕">奕</option>
      <option value="伟">伟</option>
      <option value="VON">VON</option>
      <option value="静">静</option>
      <option value="Sharon">Sharon</option>
    </select>
    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="closeResendModal()">取消</button>
      <button class="modal-btn-confirm" id="resendConfirmBtn" onclick="confirmResend()" disabled>确认发送</button>
    </div>
  </div>
</div>

<!-- 批准管理员选择 Modal -->
<div id="approveModal">
  <div class="modal-box">
    <div class="modal-title">批准入群</div>
    <div class="modal-sub" id="modalSubText"></div>
    <div class="modal-label">批准管理员</div>
    <select id="modalAdminSelect" onchange="document.getElementById('modalConfirmBtn').disabled=!this.value">
      <option value="">— 请选择 —</option>
      <option value="笑">笑</option>
      <option value="奕">奕</option>
      <option value="伟">伟</option>
      <option value="VON">VON</option>
      <option value="静">静</option>
      <option value="Sharon">Sharon</option>
    </select>
    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="closeApproveModal()">取消</button>
      <button class="modal-btn-confirm" id="modalConfirmBtn" onclick="confirmApprove()" disabled>确认批准</button>
    </div>
  </div>
</div>

<header>
  <div class="header-left">
    <span class="hd">D</span>
    <span class="ht">录取信息管理</span>
  </div>
  <div style="display:flex;align-items:center;gap:16px;">
    <span class="user-email" id="userEmail"></span>
    <button class="btn-logout" id="btnLogout" onclick="logout()" style="display:none;">退出登录</button>
  </div>
</header>

<!-- 登录屏 -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-title">管理员登录</div>
    <div class="login-sub">Duke 录取信息管理后台</div>
    <div class="form-group">
      <label>邮箱</label>
      <input type="email" id="loginEmail" placeholder="管理员邮箱" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>密码</label>
      <div style="position:relative;">
        <input type="password" id="loginPassword" placeholder="密码" autocomplete="current-password"
               onkeydown="if(event.key==='Enter') doLogin()"
               style="width:100%;padding:12px 44px 12px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'Noto Serif SC',serif;background:#faf9f7;color:var(--text);outline:none;box-sizing:border-box;"/>
        <button type="button" onclick="togglePwd()" tabindex="-1"
                style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:0;color:var(--muted);">
          <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>
    <button class="btn-login" id="btnLogin" onclick="doLogin()">登 录</button>

  // 数据可见性分层（仅前端UI隐藏，非真正数据隔离）：

  // ── Data ──
  async function loadRecords() {
    // 显示所有非2030记录，以及2030中的Pre-med Track / SF Bay Area Duke Families
    const { data, error } = await db
      .from('admissions_submissionsMulti')
      .select('*')
      .or('class_year.neq.2030,class_year.is.null,and(class_year.eq.2030,admission_type.eq.Pre-med Track),admission_type.eq.扯谈Duke群1.0,admission_type.eq.扯谈Duke群2.0,admission_type.eq.SF Bay Area Duke Families')
      .order('created_at', { ascending: false });

    document.getElementById('tableLoading').style.display = 'none';

    if (error) {
      document.getElementById('tableEmpty').textContent = '加载失败：' + error.message;
      document.getElementById('tableEmpty').style.display = 'block';
      return;
    }

    allRecords = data || [];
    // 数据可见性分层（前端UI隐藏，详见上方常量注释）
    if (BAYAREA_ONLY_EMAILS.includes(currentAdminEmail)) {
      allRecords = allRecords.filter(r => r.admission_type === 'SF Bay Area Duke Families');
    } else if (!FULL_ACCESS_EMAILS.includes(currentAdminEmail)) {
      allRecords = allRecords.filter(r => r.admission_type !== 'SF Bay Area Duke Families');
    }
    populateYearFilter();
    applyFilters();
    document.getElementById('dataTable').style.display = 'table';
  }

  function populateYearFilter() {
    const years = [...new Set(allRecords.map(r => r.class_year).filter(Boolean))].sort();
    const sel = document.getElementById('filterYear');
    years.forEach(y => {
      const opt = document.createElement('option');
      opt.value = y;
      opt.textContent = y + ' 届';
      sel.appendChild(opt);
    });
  }

  function applyFilters() {
    const type = document.getElementById('filterType').value;
    const year = document.getElementById('filterYear').value;
    const committed = document.getElementById('filterCommitted').value;
    const status = document.getElementById('filterStatus').value;
    const search = document.getElementById('filterSearch').value.toLowerCase();

    let filtered = allRecords.filter(r => {
      if (type && r.admission_type !== type) return false;
      if (year && String(r.class_year) !== year) return false;
      if (committed !== '') {
        if (committed === 'true' && r.committed !== true) return false;
        if (committed === 'false' && r.committed !== false) return false;
      }
      if (status) {
        if (status === 'approved' && !r.approved_at) return false;
        if (status === 'rejected' && !r.rejected_at) return false;
        if (status === 'shelved' && !r.shelved_at) return false;
        if (status === 'pending' && (r.approved_at || r.rejected_at || r.shelved_at)) return false;
      }
      if (search) {
        const haystack = [r.student_name_cn, r.student_name_en, r.high_school, r.location, r.submitter_name].join(' ').toLowerCase();
        if (!haystack.includes(search)) return false;
      }
      return true;
    });

    // Sort
    filtered.sort((a, b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (va === null || va === undefined) va = '';
      if (vb === null || vb === undefined) vb = '';
      if (typeof va === 'string') va = va.toLowerCase();
      if (typeof vb === 'string') vb = vb.toLowerCase();
      if (va < vb) return sortDir === 'asc' ? -1 : 1;
      if (va > vb) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });

    renderTable(filtered);
    document.getElementById('recordCount').textContent = `共 ${allRecords.length} 条记录，显示 ${filtered.length} 条`;
  }

  function sortBy(col) {
    if (sortCol === col) {
      sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      sortCol = col;
      sortDir = 'asc';
    }
    // Update header classes
    document.querySelectorAll('thead th').forEach(th => {
      th.classList.remove('sort-asc', 'sort-desc');
    });
    event.target.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
    applyFilters();
  }

  const GITHUB_BASE = 'https://raw.githubusercontent.com/parentsduke/parentsduke/main';

  // 智能打开文件：先试 Supabase，404 再试 GitHub
  async function openFile(path) {
    if (!path) return;
    const supaUrl = `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${path}`;
    const ghUrl   = `${GITHUB_BASE}/${path}`;
    try {
      const res = await fetch(supaUrl, { method: 'HEAD' });
      if (res.ok) { window.open(supaUrl, '_blank'); return; }
    } catch(e) {}
    window.open(ghUrl, '_blank');
  }

  function getFileUrl(path) {
    if (!path) return null;
    return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${path}`;
  }

  // ── 人员标记（同步到 Supabase，三人共享） ──
  const personCol = { '笑': 'mark_xiao', '奕': 'mark_yi', '伟': 'mark_wei', 'VON': 'mark_von', '静': 'mark_jing', 'Sharon': 'mark_sharon' };

  async function saveMark(recordId, person, val) {
    const col = personCol[person];
    if (!col) return;
    const update = {};
    update[col] = val || null;
    await db.from('admissions_submissionsMulti').update(update).eq('id', recordId);
    await db.rpc('append_approval_log', {
      record_id: recordId,
      entry: { action: 'mark_' + person, by: document.getElementById('userEmail').textContent || 'admin', val: val || '', at: new Date().toISOString() }
    });
    const rec = allRecords.find(r => r.id === recordId);
    if (rec) rec[col] = val || null;
  }

  async function saveCommitted(recordId, val) {
    const update = {
      committed: val === 'true' ? true : val === 'false' ? false : null,
      committed_at: val === 'true' ? new Date().toISOString() : null
    };
    await db.from('admissions_submissionsMulti').update(update).eq('id', recordId);
    await db.rpc('append_approval_log', {
      record_id: recordId,
      entry: { action: 'committed_' + val, by: document.getElementById('userEmail').textContent || 'admin', at: new Date().toISOString() }
    });
    const rec = allRecords.find(r => r.id === recordId);
    if (rec) { rec.committed = update.committed; rec.committed_at = update.committed_at; }
  }

  let _actionArgs = null;
  let _inputArgs = null;

  // ── catalist 下拉菜单控制 ──
  function toggleCatMenu(e, menuId) {
    e.stopPropagation();
    const menu = document.getElementById(menuId);
    const isOpen = menu.classList.contains('open');
    document.querySelectorAll('.catalist-menu.open').forEach(m => m.classList.remove('open'));
    if (!isOpen) menu.classList.add('open');
  }
  function closeCatMenu(menuId) {
    document.getElementById(menuId)?.classList.remove('open');
  }
  document.addEventListener('click', () => {
    document.querySelectorAll('.catalist-menu.open').forEach(m => m.classList.remove('open'));
  });

  // ── 生成 catalist 操作菜单 HTML ──
  function buildCatMenu(r) {
    const id   = r.id;
    const sRaw = r.student_name_cn || r.student_name_en || '';
    const sName = sRaw.replace(/'/g, "\\'");
    const email = (r.submitter_email || '').replace(/'/g, "\\'");
    const college = (r.college || '').replace(/'/g, "\\'");

    let items = '';

    // 各操作历史辅助
    const log = r.approval_log || [];
    const logBy = (action) => log.filter(e=>e.action===action).map(e=>e.by);
    const logStr = (action, label) => { const by = logBy(action); return by.length ? `${label}:${by.join(' ')}` : ''; };
    const histSpan = (s) => `<span class="catalist-status" style="color:#5a7fbf;font-weight:400;">${s}</span>`;

    if (r.rejected_at) {
      items += `<span class="catalist-status" style="color:var(--red);">❌ 已拒绝</span>`;
      const s = logStr('rejected','拒'); if (s) items += histSpan(s);
      items += `<button class="catalist-item" onclick="closeCatMenu('actmenu-${id}');openActionModal('unreject','${id}','${sName}')">↩ 取消拒绝</button>`;

    } else if (r.approved_at) {
      items += `<span class="catalist-status" style="color:var(--green);">✅ 已批准</span>`;
      if (r.approved_by) items += histSpan(`批:${r.approved_by}`);
      const sr = logStr('resent','重发'); if (sr) items += histSpan(sr);
      items += `<button class="catalist-item" onclick="closeCatMenu('actmenu-${id}');resendApproval('${id}','${email}','${sName}','${r.class_year||''}','${r.admission_type||''}','${college}')">📨 重新发送链接</button>`;
      items += `<button class="catalist-item" style="color:var(--red);" onclick="closeCatMenu('actmenu-${id}');unapproveRecord('${id}','${sName}')">↩ 取消批准</button>`;

    } else if (r.shelved_at) {
      items += `<span class="catalist-status" style="color:#b45309;">⏸ 已搁置</span>`;
      const ssByField = r.shelved_by ? `搁:${r.shelved_by}` : '';
      const ssByLog   = logStr('shelved','搁');
      const ss = ssByField || ssByLog;
      if (ss) items += histSpan(ss);
      items += `<button class="catalist-item" onclick="closeCatMenu('actmenu-${id}');openActionModal('unshelve','${id}','${sName}')">↩ 取消搁置</button>`;

    } else {
      // 待处理——若有操作历史也显示
      const histLines = [
        logStr('rejected','曾拒'), logStr('unrejected','取拒'),
        logStr('shelved','曾搁'), logStr('unshelved','取搁'),
        logStr('unapproved','取批'),
      ].filter(Boolean);
      if (histLines.length) {
        items += `<span class="catalist-status" style="color:var(--muted);">待处理</span>`;
        histLines.forEach(s => { items += histSpan(s); });
      }
      items += `<button class="catalist-item" style="color:var(--green);" onclick="closeCatMenu('actmenu-${id}');approveRecord('${id}','${email}','${sName}','${r.class_year||''}','${r.admission_type||''}','${college}')">✅ 批准入群</button>`;
      items += `<button class="catalist-item" onclick="closeCatMenu('actmenu-${id}');openActionModal('reject','${id}','${sName}')">❌ 拒绝</button>`;
      items += `<button class="catalist-item" onclick="closeCatMenu('actmenu-${id}');openActionModal('shelve','${id}','${sName}')">⏸ 搁置</button>`;
    }

    // 催信入口（有邮箱时显示，加分隔线）
    const reminderLog = (r.approval_log||[]).filter(e=>e.action==='reminder_sent');
    if (r.submitter_email) {
      items += `<div style="border-top:1px solid var(--border);margin:2px 0;"></div>`;
      items += `<button class="catalist-item" style="color:var(--navy);" onclick="closeCatMenu('actmenu-${id}');sendReminder('${id}','${(r.submitter_email||'').replace(/'/g,"\\'")}','${sName}')">📧 催信</button>`;
      if (reminderLog.length) items += histSpan(`催${reminderLog.length}:${reminderLog.map(e=>e.by).join(' ')}`);
    }

    const btnLabel = r.rejected_at ? '已拒绝' : r.approved_at ? '已批准' : r.shelved_at ? '已搁置' : '操作';    const btnBg    = r.rejected_at ? '#7f1d1d' : r.approved_at ? '#14532d' : r.shelved_at ? '#78350f' : '#444';
    const btnHover = r.rejected_at ? '#991b1b' : r.approved_at ? '#166534' : r.shelved_at ? '#92400e' : '#222';

    return `<div class="catalist-wrap">
      <button onclick="toggleCatMenu(event,'actmenu-${id}')"
        style="padding:3px 8px;background:${btnBg};color:#fff;border:none;border-radius:5px;
               font-size:11px;cursor:pointer;font-family:'Noto Serif SC',serif;white-space:nowrap;"
        onmouseover="this.style.background='${btnHover}'" onmouseout="this.style.background='${btnBg}'">
        ${btnLabel} ▾
      </button>
      <div class="catalist-menu" id="actmenu-${id}">${items}</div>
    </div>`;
  }

  // ── 刷新某行的 catalist 单元格 ──
  function refreshCatCell(recordId) {
    const rec = allRecords.find(r => r.id === recordId);
    if (!rec) return;
    const cell = document.getElementById(`cell-cat-${recordId}`);
    if (cell) cell.innerHTML = buildCatMenu(rec);
  }

  function openActionModal(type, recordId, studentName) {
    _actionArgs = { type, recordId, studentName };
    const titles = { reject: '确认拒绝', shelve: '确认搁置', unshelve: '确认取消搁置', unreject: '确认取消拒绝' };
    const subs   = { reject: `拒绝申请：${studentName}`, shelve: `搁置申请：${studentName}`, unshelve: `取消搁置：${studentName}`, unreject: `恢复为待处理：${studentName}` };
    document.getElementById('actionModalTitle').textContent   = titles[type] || '操作确认';
    document.getElementById('actionModalSubText').textContent = subs[type]   || studentName;
    document.getElementById('actionAdminSelect').value = '';
    document.getElementById('actionConfirmBtn').disabled = true;
    document.getElementById('actionModal').style.display = 'flex';
  }

  function closeActionModal() {
    document.getElementById('actionModal').style.display = 'none';
    document.getElementById('actionAdminSelect').value = '';
    document.getElementById('actionConfirmBtn').disabled = true;
    _actionArgs = null;
    _inputArgs = null;
  }

  async function confirmAction() {
    const adminName = document.getElementById('actionAdminSelect').value;
    if (!adminName) return;

    // Handle input saves (nickname / admin_notes)
    if (_inputArgs) {
      const { type, recordId, val } = _inputArgs;
      _inputArgs = null;
      document.getElementById('actionModal').style.display = 'none';
      document.getElementById('actionAdminSelect').value = '';
      document.getElementById('actionConfirmBtn').disabled = true;
      if (type === 'nickname') await saveNickname(recordId, val, adminName);
      else if (type === 'admin_notes') await saveAdminNotes(recordId, val, adminName);
      return;
    }

    // Handle action buttons (shelve/unshelve/reject)
    if (!_actionArgs) return;
    const { type, recordId, studentName } = _actionArgs;
    closeActionModal();
    try {
      const now = new Date().toISOString();
      const rec = allRecords.find(r => r.id === recordId);
      const sName = studentName;

      if (type === 'shelve') {
        await db.from('admissions_submissionsMulti').update({ shelved_at: now, shelved_by: adminName }).eq('id', recordId);
        await db.rpc('append_approval_log', { record_id: recordId, entry: { action: 'shelved', by: adminName, at: now } });
        if (rec) { rec.shelved_at = now; rec.shelved_by = adminName; rec.approval_log = rec.approval_log || []; rec.approval_log.push({ action: 'shelved', by: adminName, at: now }); }
        refreshCatCell(recordId);
        notifyAdminStatusChange('搁置', adminName, sName);

      } else if (type === 'unshelve') {
        await db.from('admissions_submissionsMulti').update({ shelved_at: null, shelved_by: null }).eq('id', recordId);
        await db.rpc('append_approval_log', { record_id: recordId, entry: { action: 'unshelved', by: adminName, at: now } });
        if (rec) { rec.shelved_at = null; rec.shelved_by = null; rec.approval_log = rec.approval_log || []; rec.approval_log.push({ action: 'unshelved', by: adminName, at: now }); }
        refreshCatCell(recordId);

      } else if (type === 'reject') {
        await db.from('admissions_submissionsMulti').update({ rejected_at: now }).eq('id', recordId);
        await db.rpc('append_approval_log', { record_id: recordId, entry: { action: 'rejected', by: adminName, at: now } });
        if (rec) { rec.rejected_at = now; rec.approval_log = rec.approval_log || []; rec.approval_log.push({ action: 'rejected', by: adminName, at: now }); }
        refreshCatCell(recordId);
        notifyAdminStatusChange('拒绝', adminName, sName);

      } else if (type === 'unreject') {
        await db.from('admissions_submissionsMulti').update({ rejected_at: null }).eq('id', recordId);
        await db.rpc('append_approval_log', { record_id: recordId, entry: { action: 'unrejected', by: adminName, at: now } });
        if (rec) { rec.rejected_at = null; rec.approval_log = rec.approval_log || []; rec.approval_log.push({ action: 'unrejected', by: adminName, at: now }); }
        refreshCatCell(recordId);
      }    } catch(e) {
      alert('❌ 操作失败：' + e.message);
    }
  }

  function sendReminder(recordId, email, studentName) {
    if (!email) { alert('该记录没有邮箱，无法发送催信'); return; }
    _reminderArgs = { recordId, email, studentName };
    document.getElementById('reminderModalSubText').innerText = `学生：${studentName}\n将发送到：${email}`;
    document.getElementById('reminderAdminSelect').value = '';
    document.getElementById('reminderConfirmBtn').disabled = true;
    document.getElementById('reminderNote').value = '';
    // 根据记录里已有的文件情况，自动预勾选缺失项
    const rec = allRecords.find(r => r.id === recordId) || {};
    // 2027-2029届本科是"三选一"，缺哪个不代表必须补哪个，不做自动预勾选，交给管理员自己判断催哪一项
    const isThreeChoice = /届本科$/.test(rec.admission_type || '');
    // 研究生只认录取通知书，宿舍照片/Committed Letter 对研究生不适用，隐藏这两项避免误催
    const isGradRec = ['grad_masters','grad_phd','硕士','博士'].includes(rec.admission_type || '');
    document.querySelectorAll('.reminder-item-dorm, .reminder-item-cl').forEach(el => {
      el.style.display = isGradRec ? 'none' : '';
    });
    const missingMap = isThreeChoice ? {
      '宿舍照片': false,
      'Committed Letter': false,
      '录取通知书': false,
      '其他信息': false,
    } : isGradRec ? {
      '宿舍照片': false,
      'Committed Letter': false,
      '录取通知书': !rec.grad_letter_path,
      '其他信息': false,
    } : {
      '宿舍照片': !rec.dorm_photo_path,
      'Committed Letter': !rec.committed_letter_path,
      '录取通知书': !rec.grad_letter_path && !rec.committed_letter_path,
      '其他信息': false,
    };
    document.querySelectorAll('.reminder-missing-cb').forEach(cb => {
      cb.checked = !!missingMap[cb.value];
    });
    document.getElementById('reminderMissingHint').innerText = isThreeChoice
      ? '该届次为「三选一」，未自动预勾选，请手动选择要催的具体材料'
      : '';
    document.getElementById('reminderModal').style.display = 'flex';
  }

  async function confirmReminder() {
    const adminName = document.getElementById('reminderAdminSelect').value;
    if (!adminName) { alert('请先选择操作管理员'); return; }
    const { recordId, email, studentName } = _reminderArgs || {};
    if (!recordId) return;
    const missingItems = Array.from(document.querySelectorAll('.reminder-missing-cb:checked')).map(cb => cb.value);
    const note = document.getElementById('reminderNote').value.trim();
    if (!missingItems.length && !note) {
      if (!confirm('未勾选缺少材料也未填写备注，将发送一封不带具体内容的通用催信，确定继续吗？')) return;

        method: 'POST',
        headers: {

          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        },
        body: JSON.stringify({ email, studentName, type: 'reminder', id: recordId, missingItems, note }),
      });

        throw new Error(err);

  // ── Export CSV ──
  function exportCSV() {
    const headers = ['微信昵称','提交时间','中文姓名','英文姓名','高中学校','地区','录取类型','届次','学院','专业','Committed','备注','管理员备注','提交者','微信号','邮箱','宿舍照片链接','录取通知书链接','Committed Letter链接','处理状态'];
    const type = document.getElementById('filterType').value;
    const year = document.getElementById('filterYear').value;
    const committed = document.getElementById('filterCommitted').value;
    const search = document.getElementById('filterSearch').value.toLowerCase();

    let filtered = allRecords.filter(r => {
      if (type && r.admission_type !== type) return false;
      if (year && String(r.class_year) !== year) return false;
      if (committed !== '') {
        if (committed === 'true' && r.committed !== true) return false;
        if (committed === 'false' && r.committed !== false) return false;
      }
      if (search) {
        const haystack = [r.student_name_cn, r.student_name_en, r.high_school, r.location, r.submitter_name].join(' ').toLowerCase();
        if (!haystack.includes(search)) return false;
      }
      return true;
    });

    const rows = filtered.map(r => [
      r.wx_nickname || '',
      r.created_at ? new Date(r.created_at).toLocaleString('zh-CN') : '',
      r.student_name_cn || '',
      r.student_name_en || '',
      r.high_school || '',
      r.location || '',
      r.admission_type || '',
      r.class_year || '',
      r.college || '',
      r.major || '',
      r.committed === true ? '是' : r.committed === false ? '否' : '',
      r.notes || '',
      r.admin_notes || '',
      r.submitter_name || '',
      r.submitter_contact || '',
      r.submitter_email || '',
      getFileUrl(r.dorm_photo_path) || '',
      getFileUrl((['grad_masters','grad_phd','硕士','博士'].includes(r.admission_type)) ? r.grad_letter_path : r.committed_letter_path) || '',
      getFileUrl(r.committed_letter_path) || '',
      r.rejected_at ? '已拒绝' : r.approved_at ? '已批准' : r.shelved_at ? '已搁置' : '待处理',
    ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(','));

    const csv = '\uFEFF' + [headers.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `Duke录取记录_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

    document.getElementById('modalAdminSelect').value = '';
    document.getElementById('modalConfirmBtn').disabled = true;
    _approveArgs = null;
  }

  async function confirmApprove() {
    const adminName = document.getElementById('modalAdminSelect').value;
    if (!adminName) { alert('请先选择批准管理员'); return; }

    const { recordId, email, studentName, classYear, admissionType, college } = _approveArgs || {};
    if (!recordId) return;
    closeApproveModal();

    if (!email) {
      try {
        const _now1 = new Date().toISOString();
        await db.from('admissions_submissionsMulti')
          .update({ approved_at: _now1, approved_by: adminName })
          .eq('id', recordId);
        await db.rpc('append_approval_log', {
          record_id: recordId,
          entry: { action: 'approved', by: adminName, at: _now1 }
        });
        const rec = allRecords.find(r => r.id === recordId);
        if (rec) { rec.approved_at = _now1; rec.approved_by = adminName; }
        refreshCatCell(recordId);
        await notifyAdmin(studentName, '（无邮箱）', adminName);
        alert('✅ 已标记为批准');
      } catch(e) {
        alert('❌ 操作失败：' + e.message);
      }
      return;
    }

    try {
      const { data: qrRow, error: qrErr } = await db
        .from('private_qr_links')
        .insert({
          ...getQRInfo(classYear, admissionType, college),
          reserved_for: email,
          reserved_at:  new Date().toISOString(),
        })
        .select()
        .single();

      if (qrErr || !qrRow) throw new Error('创建二维码链接失败：' + (qrErr?.message || '未知错误'));

      const link = `https://dukeparents.org/qrMulti.html?token=${qrRow.token}`;
      const { groupName } = getQRInfo(classYear, admissionType, college);

      const res = await fetch(`${SUPABASE_URL}/functions/v1/send-approval-email-multi`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
        body: JSON.stringify({ email, studentName, link, groupName }),
      });

      if (!res.ok) { const err = await res.text(); throw new Error(err); }

      const _now2 = new Date().toISOString();
      await db.from('admissions_submissionsMulti')
        .update({ approved_at: _now2, approved_by: adminName })
        .eq('id', recordId);
      await db.rpc('append_approval_log', {
        record_id: recordId,
        entry: { action: 'approved', by: adminName, at: _now2 }
      });

      const rec = allRecords.find(r => r.id === recordId);
      if (rec) { rec.approved_at = _now2; rec.approved_by = adminName; }

      refreshCatCell(recordId);

      await notifyAdmin(studentName, email, adminName);
      alert(`✅ 已发送入群链接到 ${email}`);
    } catch(e) {
      alert('❌ 发送失败：' + e.message);
    }
  }

  // ── 搁置 ──
  async function shelveRecord(recordId, studentName) {
    if (!confirm(`搁置 ${studentName}？（已在群中，暂不处理）`)) return;
    try {
      const now = new Date().toISOString();
      await db.from('admissions_submissionsMulti')
        .update({ shelved_at: now })
        .eq('id', recordId);
      await db.rpc('append_approval_log', {
        record_id: recordId,
        entry: { action: 'shelved', by: document.getElementById('userEmail').textContent || 'admin', at: new Date().toISOString() }
      });
      const rec = allRecords.find(r => r.id === recordId);
      if (rec) rec.shelved_at = now;
      refreshCatCell(recordId);
    } catch(e) {
      alert('❌ 操作失败：' + e.message);
    }
  }

  // ── 取消搁置 ──
  async function unshelveRecord(recordId, studentName) {
    if (!confirm(`取消搁置 ${studentName}，恢复为待处理？`)) return;
    try {
      await db.from('admissions_submissionsMulti')
        .update({ shelved_at: null })
        .eq('id', recordId);
      await db.rpc('append_approval_log', {
        record_id: recordId,
        entry: { action: 'unshelved', by: document.getElementById('userEmail').textContent || 'admin', at: new Date().toISOString() }
      });
      const rec = allRecords.find(r => r.id === recordId);
      if (rec) rec.shelved_at = null;
      refreshCatCell(recordId);
    } catch(e) {
      alert('❌ 操作失败：' + e.message);
    }
  }

  // ── 取消批准 ──
  async function unapproveRecord(recordId, studentName) {
    if (!confirm(`确认取消批准 ${studentName}？\n\n将清除批准状态，记录回到待处理。`)) return;
    try {
      const now = new Date().toISOString();
      await db.from('admissions_submissionsMulti')
        .update({ approved_at: null, approved_by: null })
        .eq('id', recordId);
      await db.rpc('append_approval_log', {
        record_id: recordId,
        entry: { action: 'unapproved', by: adminName, at: now }
      });
      const rec = allRecords.find(r => r.id === recordId);
      if (rec) { rec.approved_at = null; rec.approved_by = null; }
      refreshCatCell(recordId);
    } catch(e) {
      alert('取消批准失败：' + e.message);
    }
  }

  function rejectRecord(recordId, studentName) { openActionModal('reject', recordId, studentName); }

  // ── 重新发送入群链接 ──
  // ── 重新发送 Modal 状态 ──
  let _resendArgs = null;

  function resendApproval(recordId, email, studentName, classYear, admissionType, college) {
    if (!email) { alert('该记录没有邮箱，无法发送链接'); return; }
    _resendArgs = { recordId, email, studentName, classYear, admissionType, college };
    document.getElementById('resendModalSubText').innerText = `学生：${studentName}\n将发送到：${email}`;
    document.getElementById('resendAdminSelect').value = '';
    document.getElementById('resendModal').classList.add('show');
  }

  function closeResendModal() {
    document.getElementById('resendModal').classList.remove('show');
    document.getElementById('resendAdminSelect').value = '';
    document.getElementById('resendConfirmBtn').disabled = true;
    _resendArgs = null;
  }

  async function confirmResend() {
    const adminName = document.getElementById('resendAdminSelect').value;
    if (!adminName) { alert('请先选择操作管理员'); return; }

    const { recordId, email, studentName, classYear, admissionType, college } = _resendArgs || {};
    if (!recordId) return;
    closeResendModal();

    try {
      // 作废旧的未使用 token（同一邮箱）
      await db.from('private_qr_links')
        .update({ used: true, used_at: new Date().toISOString() })
        .eq('reserved_for', email)
        .eq('used', false);

      // 创建新 token
      const { data: qrRow, error: qrErr } = await db
        .from('private_qr_links')
        .insert({
          ...getQRInfo(classYear, admissionType, college),
          reserved_for: email,
          reserved_at:  new Date().toISOString(),
        })
        .select()
        .single();

      if (qrErr || !qrRow) {
        throw new Error('创建二维码链接失败：' + (qrErr?.message || '未知错误'));
      }

      const link = `https://dukeparents.org/qrMulti.html?token=${qrRow.token}`;
      const { groupName } = getQRInfo(classYear, admissionType, college);

      const res = await fetch(`${SUPABASE_URL}/functions/v1/send-approval-email-multi`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        },
        body: JSON.stringify({ email, studentName, link, groupName }),
      });

      if (!res.ok) {
        const err = await res.text();
        throw new Error(err);
      }

      await db.rpc('append_approval_log', {
        record_id: recordId,
        entry: { action: 'resent', by: adminName, at: new Date().toISOString() }
      });

      const rec2 = allRecords.find(r => r.id === recordId);
      if (rec2) { rec2.approval_log = rec2.approval_log || []; rec2.approval_log.push({ action: 'resent', by: adminName, at: new Date().toISOString() }); }
      refreshCatCell(recordId);

      alert(`✅ 已重新发送入群链接到 ${email}`);
    } catch(e) {
      alert('❌ 发送失败：' + e.message);
    }
  }

  function togglePwd() {
    const input = document.getElementById('loginPassword');
    const icon = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      input.type = 'password';
      icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  }

  init();

  // ══════════════════════════════════════════
  // 值班班长管理
  // ══════════════════════════════════════════

  let dutyOfficers = [];       // 全部班长
  let currentDutyOfficerId = null;  // 当前值班ID
  let selectedOfficerId = null;     // modal里选中的

  function getMondayStr(offsetWeeks = 0) {
    // 统一用美国东部时间（自动处理夏令时）
    const etNow = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/New_York' }));
    const day = etNow.getDay(); // 0=周日
    const diff = day === 0 ? -6 : 1 - day;
    etNow.setDate(etNow.getDate() + diff + offsetWeeks * 7);
    // 手动格式化，避免 toISOString() 转回 UTC
    const y = etNow.getFullYear();
    const m = String(etNow.getMonth() + 1).padStart(2, '0');
    const d = String(etNow.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  async function loadDuty() {
    // 加载班长名单
    const { data: officers } = await db
      .from('duty_officers')
      .select('id, name, email, sort_order, is_active')
      .order('sort_order');
    dutyOfficers = officers || [];

    // 查本周值班
    const weekStart = getMondayStr(0);
    const { data: sched } = await db
      .from('duty_schedule')
      .select('officer_id, duty_officers(name, email)')
      .eq('week_start', weekStart)
      .limit(1)
      .maybeSingle();

    // 查下周值班
    const nextWeekStart = getMondayStr(1);
    const { data: nextSched } = await db
      .from('duty_schedule')
      .select('duty_officers(name)')
      .eq('week_start', nextWeekStart)
      .limit(1)
      .maybeSingle();

    const banner = document.getElementById('dutyBanner');
    banner.style.display = 'flex';

    if (sched && sched.duty_officers) {
      currentDutyOfficerId = sched.officer_id;
      document.getElementById('dutyName').textContent = sched.duty_officers.name;
      document.getElementById('dutyWeek').textContent = `本周（${weekStart}）`;
      banner.classList.remove('no-duty');
    } else {
      currentDutyOfficerId = null;
      document.getElementById('dutyName').textContent = '暂无排班';
      document.getElementById('dutyWeek').textContent = `本周（${weekStart}）— 请设置`;
      banner.classList.add('no-duty');
    }

    // 显示下周预告
    const nextEl = document.getElementById('dutyNextWeek');
    if (nextSched && nextSched.duty_officers) {
      nextEl.textContent = `下周预告：${nextSched.duty_officers.name}（${nextWeekStart}）`;
      nextEl.style.display = '';
    } else {
      nextEl.textContent = '';
      nextEl.style.display = 'none';
    }
  }

  function openDutyModal() {
    selectedOfficerId = currentDutyOfficerId;
    const list = document.getElementById('officerList');
    list.innerHTML = dutyOfficers
      .filter(o => o.is_active)
      .map(o => `
        <div class="officer-row ${o.id === selectedOfficerId ? 'selected' : ''}"
             onclick="selectOfficer(${o.id}, this)">
          <div>
            <div class="o-name">${o.name}</div>
            <div class="o-email">${o.email}</div>
          </div>
          ${o.id === currentDutyOfficerId ? '<span class="o-badge">当前值班</span>' : ''}
        </div>
      `).join('');
    document.getElementById('dutyModalOverlay').classList.add('open');
  }

  function selectOfficer(id, el) {
    selectedOfficerId = id;
    document.querySelectorAll('.officer-row').forEach(r => r.classList.remove('selected'));
    el.classList.add('selected');
  }

  function closeDutyModal() {
    document.getElementById('dutyModalOverlay').classList.remove('open');
  }

  async function confirmDuty() {
    if (!selectedOfficerId) return;
    const weekStart = getMondayStr(0);
    // upsert 本周排班
    const { error } = await db
      .from('duty_schedule')
      .upsert({ officer_id: selectedOfficerId, week_start: weekStart }, { onConflict: 'week_start' });
    if (error) { alert('保存失败：' + error.message); return; }
    closeDutyModal();
    await loadDuty();
  }

  async function advanceWeek() {
    // 找当前值班在名单中的位置，取下一个
    const active = dutyOfficers.filter(o => o.is_active);
    if (active.length === 0) { alert('没有可用班长'); return; }
    const idx = active.findIndex(o => o.id === currentDutyOfficerId);
    const next = active[(idx + 1) % active.length];
    const weekStart = getMondayStr(1); // 下周一
    const name = next.name;
    if (!confirm(`下周（${weekStart}）值班设为：${name}？`)) return;
    const { error } = await db
      .from('duty_schedule')
      .upsert({ officer_id: next.id, week_start: weekStart }, { onConflict: 'week_start' });
    if (error) { alert('保存失败：' + error.message); return; }
    alert(`✅ 已设置下周值班：${name}`);
  }
</script>
