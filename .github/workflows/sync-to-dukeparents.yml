name: Sync to dukeparents backup

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 18 * * *'   # 每天UTC 18:00（北京时间凌晨2点）也同步一次，防止漏推
  workflow_dispatch:        # 允许手动点击运行

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push mirror to backup repo
        run: |
          git remote add backup https://dukeparents:${{ secrets.SYNC_TARGET_TOKEN }}@github.com/dukeparents/dukeparents.git
          git push backup main --force
