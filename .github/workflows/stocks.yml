name: Generate Stocks Page

on:
  schedule:
    # 每日3次（UTC时间），对应美国东部时间（夏令时 ET = UTC-4）
    - cron: '30 13 * * *'  # ET 09:30（开盘）
    - cron: '0 16 * * *'   # ET 12:00（午间）
    - cron: '0 23 * * *'   # ET 19:00（收盘后）
  workflow_dispatch:        # 允许手动触发

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Run generate_stocks.py
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          RESEND_API_KEY:     ${{ secrets.RESEND_API_KEY }}
        run: python .github/scripts/generate_stocks.py

      - name: Commit and push stocks.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stocks.html
          git diff --cached --quiet || git commit -m "auto: update stocks.html $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
