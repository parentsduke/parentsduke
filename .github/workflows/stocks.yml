name: Generate Stocks Page

on:
  schedule:
    # 每日5次（UTC时间），对应北京时间约：6:00 / 10:00 / 16:00 / 22:00 / 次日0:30
    - cron: '0 22 * * *'   # 北京 06:00
    - cron: '0  2 * * *'   # 北京 10:00
    - cron: '30 13 * * *'  # 北京 21:30（美股开盘）
    - cron: '0  21 * * *'  # 北京 05:00（美股收盘后）
    - cron: '0  8 * * *'   # 北京 16:00
  workflow_dispatch:        # 允许手动触发

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Run generate_stocks.py
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python .github/scripts/generate_stocks.py

      - name: Commit and push stocks.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stocks.html
          git diff --cached --quiet || git commit -m "auto: update stocks.html $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
