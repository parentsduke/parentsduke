<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>设置密码</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .logo {
      text-align: center;
      margin-bottom: 24px;
      font-size: 28px;
    }

    h1 {
      text-align: center;
      font-size: 22px;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    p.subtitle {
      text-align: center;
      color: #888;
      font-size: 14px;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 14px;
      color: #444;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .input-wrapper {
      position: relative;
      margin-bottom: 20px;
    }

    .input-wrapper input {
      width: 100%;
      padding: 12px 44px 12px 16px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
    }

    .input-wrapper input:focus {
      border-color: #4f8ef7;
    }

    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: #aaa;
      width: auto;
      line-height: 1;
      transition: color 0.2s;
      display: flex;
      align-items: center;
    }

    .eye-btn:hover { color: #4f8ef7; background: none; }
    .eye-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.8; }

    .strength-bar {
      height: 4px;
      border-radius: 4px;
      background: #eee;
      margin-top: -14px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      width: 0%;
      border-radius: 4px;
      transition: width 0.3s, background 0.3s;
    }

    .strength-text {
      font-size: 12px;
      margin-top: -16px;
      margin-bottom: 20px;
      color: #aaa;
    }

    .pwd-hint {
      font-size: 12px;
      color: #aaa;
      margin-top: -16px;
      margin-bottom: 6px;
    }

    button {
      width: 100%;
      padding: 13px;
      background: #4f8ef7;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #3a7ae0; }
    button:disabled { background: #b0c8f9; cursor: not-allowed; }

    .message {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      text-align: center;
      display: none;
    }

    .message.success {
      background: #e6f4ea;
      color: #2e7d32;
      display: block;
    }

    .message.error {
      background: #fdecea;
      color: #c62828;
      display: block;
    }

    .loading {
      display: none;
      text-align: center;
      color: #888;
      font-size: 14px;
      margin-top: 12px;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="#4f8ef7" stroke-width="1.8" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
  </div>
  <h1>设置您的密码</h1>
  <p class="subtitle">欢迎！请设置一个安全密码以完成注册。</p>

  <label for="password">新密码</label>
  <div class="input-wrapper">
    <input type="password" id="password" placeholder="请输入新密码" oninput="checkStrength()" />
    <button type="button" class="eye-btn" onclick="toggleEye('password', this)" tabindex="-1">
      <svg id="eye-icon-password" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
  </div>
  <div class="pwd-hint">密码至少需要8位</div>
  <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
  <div class="strength-text" id="strengthText"></div>

  <label for="confirm">确认密码</label>
  <div class="input-wrapper">
    <input type="password" id="confirm" placeholder="再次输入密码" />
    <button type="button" class="eye-btn" onclick="toggleEye('confirm', this)" tabindex="-1">
      <svg id="eye-icon-confirm" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
  </div>

  <button id="submitBtn" onclick="setPassword()" disabled>确认设置密码</button>

  <div class="loading" id="loading">正在设置中...</div>
  <div class="message" id="message"></div>
</div>

<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ⚠️ 替换为你的 Supabase 项目信息
  const SUPABASE_URL = 'https://ritglkwqpwlcjwemhfqd.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJpdGdsa3dxcHdsY2p3ZW1oZnFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MzEyMTQsImV4cCI6MjA4NzMwNzIxNH0.TqjETAEGcWTd2CbvkMnmfm6bKHLtZHjXbsy3dtPuEB8';  // 这里用 anon key，安全！
  const { createClient } = supabase
  const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

  const EYE_OPEN = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
  const EYE_CLOSED = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`

  function toggleEye(inputId, btn) {
    const input = document.getElementById(inputId)
    if (input.type === 'password') {
      input.type = 'text'
      btn.innerHTML = EYE_CLOSED
    } else {
      input.type = 'password'
      btn.innerHTML = EYE_OPEN
    }
  }

  // 检测密码强度
  function checkStrength() {
    const pwd = document.getElementById('password').value
    const fill = document.getElementById('strengthFill')
    const text = document.getElementById('strengthText')
    const btn = document.getElementById('submitBtn')

    let strength = 0
    if (pwd.length >= 8) strength++
    if (/[A-Z]/.test(pwd)) strength++
    if (/[0-9]/.test(pwd)) strength++
    if (/[^A-Za-z0-9]/.test(pwd)) strength++

    const levels = [
      { width: '0%',   color: '#eee',    label: '' },
      { width: '25%',  color: '#e53935', label: '弱' },
      { width: '50%',  color: '#fb8c00', label: '一般' },
      { width: '75%',  color: '#43a047', label: '强' },
      { width: '100%', color: '#1b5e20', label: '非常强' },
    ]

    fill.style.width = levels[strength].width
    fill.style.background = levels[strength].color
    text.textContent = pwd.length > 0 ? `密码强度：${levels[strength].label}` : ''
    btn.disabled = pwd.length < 8
  }

  // 设置密码
  async function setPassword() {
    const password = document.getElementById('password').value
    const confirm = document.getElementById('confirm').value
    const msg = document.getElementById('message')
    const loading = document.getElementById('loading')
    const btn = document.getElementById('submitBtn')

    msg.className = 'message'
    msg.style.display = 'none'

    if (password !== confirm) {
      msg.textContent = '两次输入的密码不一致，请重新输入。'
      msg.className = 'message error'
      return
    }

    if (password.length < 8) {
      msg.textContent = '密码至少需要 8 位。'
      msg.className = 'message error'
      return
    }

    btn.disabled = true
    loading.style.display = 'block'

    const { data: userData, error } = await client.auth.updateUser({ password })

    loading.style.display = 'none'

    if (error) {
      msg.textContent = '设置失败：' + error.message
      msg.className = 'message error'
      btn.disabled = false
    } else {
      // ✅ 标记用户已设置密码
      const userId = userData?.user?.id
      if (userId) {
        await client
          .from('profiles')
          .update({ has_set_password: true })
          .eq('id', userId)
      }

      msg.textContent = '密码设置成功！正在跳转到登录页...'
      msg.className = 'message success'
      setTimeout(() => {
        window.location.href = '/login.html'
      }, 2000)
    }
  }
</script>

</body>
</html>
