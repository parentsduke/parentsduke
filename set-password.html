<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>设置密码 · Duke Parents</title>
  <script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #f0f4f8;
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #1a1a2e;
    }

    .container {
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 44px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo {
      font-size: 36px;
      font-weight: 900;
      color: #001a4d;
      margin-bottom: 8px;
    }

    .title {
      font-size: 18px;
      font-weight: 600;
      color: #001a4d;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 12px;
      color: #888;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: #001a4d;
    }

    .form-group input:disabled {
      background: #f5f5f5;
      cursor: not-allowed;
    }

    .btn-submit {
      width: 100%;
      padding: 13px;
      background: #001a4d;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-submit:hover:not(:disabled) {
      background: #003087;
    }

    .btn-submit:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .error-msg {
      background: #fdecea;
      color: #c62828;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
      border-left: 3px solid #c62828;
    }

    .success-msg {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
      border-left: 3px solid #2e7d32;
    }

    .info-box {
      background: #f0f4f8;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 12px;
      color: #555;
      margin-bottom: 16px;
      border-left: 3px solid #003087;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 20px;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #001a4d;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .success-screen {
      display: none;
      text-align: center;
    }

    .success-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .success-title {
      font-size: 20px;
      font-weight: 600;
      color: #001a4d;
      margin-bottom: 8px;
    }

    .success-text {
      font-size: 14px;
      color: #666;
      margin-bottom: 24px;
    }

    .btn-continue {
      width: 100%;
      padding: 13px;
      background: #0a7c3e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-continue:hover {
      background: #085f30;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <!-- 表单内容 -->
    <div id="formContent">
      <div class="header">
        <div class="logo">Duke</div>
        <div class="title">设置您的密码</div>
        <div class="subtitle">完成注册以访问网站</div>
      </div>

      <div id="errorMsg" class="error-msg"></div>
      <div id="successMsg" class="success-msg"></div>

      <div class="info-box">
        📧 邮箱：<span id="emailDisplay">-</span>
      </div>

      <form id="setupForm" onsubmit="handleSubmit(event)">
        <div class="form-group">
          <label for="password">密码</label>
          <input 
            type="password" 
            id="password" 
            placeholder="输入至少 8 个字符"
            required
            minlength="8"
          />
        </div>

        <div class="form-group">
          <label for="passwordConfirm">确认密码</label>
          <input 
            type="password" 
            id="passwordConfirm" 
            placeholder="再次输入密码"
            required
          />
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          设置密码并开始使用
        </button>
      </form>
    </div>

    <!-- 成功屏幕 -->
    <div id="successScreen" class="success-screen">
      <div class="success-icon">✅</div>
      <div class="success-title">注册成功！</div>
      <div class="success-text">
        您的账户已创建，现在可以开始使用网站了。
      </div>
      <button class="btn-continue" onclick="goToHome()">
        进入网站 →
      </button>
    </div>

    <!-- 加载中 -->
    <div id="loadingScreen" class="loading">
      <div class="spinner"></div>
      <div>正在处理中...</div>
    </div>
  </div>
</div>

<script>
  let db = null;
  let userEmail = null;
  let recordId = null;

  // 等待 Supabase 加载
  window.addEventListener('load', async () => {
    if (typeof supabase === 'undefined') {
      showError('Supabase 库加载失败');
      return;
    }

    const SUPABASE_URL = 'https://ritglkwqpwlcjwemhfqd.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJpdGdsa3dxcHdsY2p3ZW1oZnFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MzEyMTQsImV4cCI6MjA4NzMwNzIxNH0.TqjETAEGcWTd2CbvkMnmfm6bKHLtZHjXbsy3dtPuEB8';

    const { createClient } = supabase;
    db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 从 URL 获取邮箱和 token
    const params = new URLSearchParams(window.location.search);
    userEmail = params.get('email');
    recordId = params.get('token');

    if (!userEmail) {
      showError('邮箱参数缺失，无法继续');
      return;
    }

    document.getElementById('emailDisplay').textContent = userEmail;
  });

  function showError(msg) {
    const errorEl = document.getElementById('errorMsg');
    errorEl.textContent = '❌ ' + msg;
    errorEl.style.display = 'block';
  }

  function hideMessage() {
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('successMsg').style.display = 'none';
  }

  function showLoading(show) {
    document.getElementById('loadingScreen').style.display = show ? 'block' : 'none';
    document.getElementById('formContent').style.display = show ? 'none' : 'block';
    if (show) {
      document.getElementById('successScreen').style.display = 'none';
    }
  }

  function goToHome() {
    // 跳转到网站首页
    window.location.href = '/index.html';
  }

  async function handleSubmit(event) {
    event.preventDefault();
    hideMessage();

    const password = document.getElementById('password').value;
    const passwordConfirm = document.getElementById('passwordConfirm').value;

    // 验证密码
    if (password !== passwordConfirm) {
      showError('两次输入的密码不一致');
      return;
    }

    if (password.length < 8) {
      showError('密码长度至少 8 个字符');
      return;
    }

    showLoading(true);

    try {
      // 步骤 1：使用邮箱和密码创建用户账户
      const { data, error } = await db.auth.signUp({
        email: userEmail,
        password: password,
      });

      if (error) {
        console.error('创建用户错误:', error);
        showLoading(false);
        
        // 如果用户已存在，尝试登录
        if (error.message.includes('already registered')) {
          showError('该邮箱已注册，请登录');
          return;
        }
        
        showError('创建账户失败：' + error.message);
        return;
      }

      // 步骤 2：如果记录 ID 存在，更新数据库标记
      if (recordId) {
        try {
          const { error: updateError } = await db
            .from('pending_uploads')
            .update({
              status: 'password_set',
              password_set_at: new Date().toISOString(),
              auth_user_id: data.user?.id
            })
            .eq('id', recordId);

          if (updateError) {
            console.warn('更新记录失败:', updateError);
          }
        } catch (e) {
          console.warn('更新记录异常:', e);
        }
      }

      // 步骤 3：显示成功屏幕
      showLoading(false);
      document.getElementById('formContent').style.display = 'none';
      document.getElementById('successScreen').style.display = 'block';

      // 3 秒后自动跳转到首页
      setTimeout(() => {
        goToHome();
      }, 3000);

    } catch (e) {
      console.error('未预期的错误:', e);
      showLoading(false);
      showError('发生错误：' + e.message);
    }
  }
</script>

</body>
</html>
