<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>修改审计记录 · DukeParents</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy:   #001a4d;
      --blue:   #003087;
      --gold:   #B8963E;
      --gold-lt:#f5ecd4;
      --bg:     #f5f3ef;
      --card:   #ffffff;
      --border: #e2ddd6;
      --text:   #1a1a1a;
      --muted:  #888070;
      --red:    #C84B31;
      --green:  #1a6b3c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); font-family: 'Noto Serif SC', serif; color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    header {
      background: var(--navy);
      border-bottom: 3px solid var(--gold);
      padding: 0 16px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-shrink: 0;
    }
    .hd { font-size: 28px; font-weight: 900; color: var(--navy); letter-spacing: -1px; -webkit-text-stroke: 1.5px #ffffff; flex-shrink: 0; }
    .ht { font-size: 14px; color: rgba(255,255,255,0.7); font-weight: 600; white-space: nowrap; }
    .header-left { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .btn-logout {
      padding: 6px 12px;
      background: transparent;
      color: rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Noto Serif SC', serif;
      white-space: nowrap;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.1); }
    .user-email {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      font-family: 'DM Mono', monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }

    /* Login */
    #loginScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 40px 20px;
    }
    .login-card {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .login-title { font-size: 20px; font-weight: 700; color: var(--navy); margin-bottom: 8px; text-align: center; }
    .login-sub { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 32px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .form-group input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 14px; font-family: 'Noto Serif SC', serif;
      background: #faf9f7; color: var(--text); outline: none;
    }
    .form-group input:focus { border-color: var(--blue); background: #fff; }
    .btn-login {
      width: 100%; padding: 14px;
      background: var(--blue); color: #fff;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600;
      font-family: 'Noto Serif SC', serif;
      cursor: pointer; margin-top: 8px;
    }
    .btn-login:hover { background: var(--navy); }
    .btn-login:disabled { background: #aab4cc; cursor: not-allowed; }
    .login-error {
      margin-top: 16px; padding: 10px 14px;
      background: #fdecea; color: var(--red);
      border-radius: 6px; font-size: 13px; display: none;
    }
    .login-error.show { display: block; }

    /* Panel */
    #auditPanel { display: none; padding: 24px 16px 16px; flex: 1; overflow: hidden; flex-direction: column; }
    @media (min-width: 768px) {
      header { padding: 0 32px; }
      #auditPanel { padding: 24px 24px 16px; }
    }

    .panel-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; flex-wrap: wrap;
      gap: 12px; margin-bottom: 20px;
    }
    .panel-title { font-size: 20px; font-weight: 700; color: var(--navy); }
    .panel-meta { font-size: 13px; color: var(--muted); margin-top: 4px; }

    .filters {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 16px;
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    }
    .filters select, .filters input {
      padding: 7px 11px;
      border: 1.5px solid var(--border); border-radius: 6px;
      font-size: 13px; font-family: 'Noto Serif SC', serif;
      background: #faf9f7; color: var(--text); outline: none;
    }
    .filters select:focus, .filters input:focus { border-color: var(--blue); }
    .filter-label { font-size: 13px; color: var(--muted); font-weight: 600; }

    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow-x: scroll;
      overflow-y: scroll;
      flex: 1;
      min-height: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      scrollbar-width: thin;
      scrollbar-color: #c9a84c #f0f0f0;
      padding-bottom: 40px;
    }
    .table-wrap::-webkit-scrollbar { height: 8px; width: 6px; }
    .table-wrap::-webkit-scrollbar-track { background: #f0f0f0; border-radius: 4px; }
    .table-wrap::-webkit-scrollbar-thumb { background: #c9a84c; border-radius: 4px; }

    table {
      width: 100%; border-collapse: separate; border-spacing: 0;
      font-size: 13px; min-width: 900px;
    }
    thead th {
      position: sticky; top: 0; z-index: 2;
      background: var(--navy); color: #fff;
      padding: 12px 14px; text-align: left;
      font-weight: 600; font-size: 12px;
      white-space: nowrap; user-select: none;
    }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:hover { background: #faf9f7; }
    tbody tr:last-child { border-bottom: none; }
    tbody td { padding: 10px 14px; vertical-align: top; }

    .field-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      font-family: 'DM Mono', monospace;
      background: #e8f0fe;
      color: #1a3c8f;
    }
    .val-old {
      color: var(--red);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      text-decoration: line-through;
      opacity: 0.8;
    }
    .val-new {
      color: var(--green);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 600;
    }
    .val-null { color: var(--muted); font-style: italic; font-size: 12px; }
    .arrow { color: var(--muted); font-size: 12px; margin: 0 6px; }
    .time-cell {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .editor-cell {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      white-space: nowrap;
    }
    .record-cell {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }
    .empty { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }

    .tabs {
      display: flex; gap: 8px; margin-bottom: 16px;
    }
    .tab-btn {
      padding: 8px 20px;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      color: var(--muted);
      font-size: 13px; font-weight: 600;
      font-family: 'Noto Serif SC', serif;
      cursor: pointer; transition: all 0.15s;
    }
    .tab-btn.active {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }
    .tab-btn:hover:not(.active) { border-color: var(--blue); color: var(--blue); }

    .btn-refresh {
      padding: 8px 14px;
      background: var(--gold);
      color: #fff; border: none;
      border-radius: 8px;
      font-size: 12px; font-weight: 600;
      font-family: 'Noto Serif SC', serif;
      cursor: pointer; white-space: nowrap;
    }
    .btn-refresh:hover { background: #a07830; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="hd">D</span>
    <div style="display:flex;flex-direction:column;gap:1px;">
      <span class="ht">修改审计记录</span>
      <span class="user-email" id="userEmail"></span>
    </div>
  </div>
  <div class="header-right">
    <button class="btn-logout" id="btnLogout" onclick="logout()" style="display:none;">退出登录</button>
  </div>
</header>

<!-- 登录 -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-title">管理员登录</div>
    <div class="login-sub">Duke 修改审计记录查看</div>
    <div class="form-group">
      <label>邮箱</label>
      <input type="email" id="loginEmail" placeholder="管理员邮箱" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="loginPassword" placeholder="密码" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') doLogin()"/>
    </div>
    <button class="btn-login" id="btnLogin" onclick="doLogin()">登 录</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- 审计面板 -->
<div id="auditPanel">
  <div class="panel-header">
    <div>
      <div class="panel-title">字段修改历史</div>
      <div class="panel-meta" id="recordCount">加载中…</div>
    </div>
    <button class="btn-refresh" onclick="loadRecords()">↻ 刷新</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab1" onclick="switchTab('admissions_edits','tab1')">录取管理（单）</button>
    <button class="tab-btn" id="tab2" onclick="switchTab('admissions_edits_multi','tab2')">录取管理（多）</button>
  </div>

  <div class="filters">
    <span class="filter-label">筛选：</span>
    <select id="filterField" onchange="applyFilters()">
      <option value="">全部字段</option>
    </select>
    <select id="filterEditor" onchange="applyFilters()">
      <option value="">全部操作者</option>
    </select>
    <input type="text" id="filterSearch" placeholder="搜索记录ID、字段值…" oninput="applyFilters()" style="min-width:200px;"/>
  </div>

  <div class="table-wrap">
    <div class="loading" id="tableLoading">加载中…</div>
    <table id="dataTable" style="display:none;">
      <thead>
        <tr>
          <th style="min-width:160px;">修改时间</th>
          <th style="min-width:130px;">操作者</th>
          <th style="min-width:100px;">字段</th>
          <th style="min-width:200px;">改前 → 改后</th>
          <th style="min-width:200px;">关联记录（姓名）</th>
          <th style="min-width:120px;">记录ID</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="empty" id="tableEmpty" style="display:none;">暂无记录</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://ritglkwqpwlcjwemhfqd.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJpdGdsa3dxcHdsY2p3ZW1oZnFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MzEyMTQsImV4cCI6MjA4NzMwNzIxNH0.TqjETAEGcWTd2CbvkMnmfm6bKHLtZHjXbsy3dtPuEB8';
  const ALLOWED_EMAILS = ['weihong_j@yahoo.com', 'lixiaobing@gmail.com', 'tianluosuri@gmail.com'];

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let allRecords = [];
  let currentTable = 'admissions_edits';
  let currentSubTable = 'admissions_submissions';

  // 字段中文名映射
  const FIELD_LABELS = {
    student_name_cn:   '中文姓名',
    student_name_en:   '英文姓名',
    high_school:       '高中学校',
    location:          '地区',
    admission_type:    '录取类型',
    class_year:        '届次',
    college:           '学院',
    major:             '专业',
    notes:             '备注',
    submitter_name:    '提交者',
    submitter_contact: '微信号',
    submitter_email:   '邮箱',
    wx_nickname:       '微信昵称',
    committed:         'Committed',
  };

  // ── Auth ──
  function switchTab(table, tabId) {
    currentTable = table;
    currentSubTable = table === 'admissions_edits' ? 'admissions_submissions' : 'admissions_submissionsMulti';
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    loadRecords();
  }

  async function init() {
    const { data: { session } } = await db.auth.getSession();
    if (session) {
      const email = session.user.email;
      if (!ALLOWED_EMAILS.includes(email)) {
        await db.auth.signOut();
        showLoginError('此账号无管理员权限');
        return;
      }
      showPanel(email);
    }
  }

  async function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('btnLogin');
    if (!email || !password) { showLoginError('请填写邮箱和密码'); return; }
    if (!ALLOWED_EMAILS.includes(email)) { showLoginError('此账号无管理员权限'); return; }
    btn.disabled = true; btn.textContent = '登录中…';
    hideLoginError();
    const { error } = await db.auth.signInWithPassword({ email, password });
    if (error) {
      showLoginError('登录失败：' + error.message);
      btn.disabled = false; btn.textContent = '登 录';
      return;
    }
    showPanel(email);
  }

  async function logout() {
    await db.auth.signOut();
    document.getElementById('auditPanel').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('btnLogout').style.display = 'none';
    document.getElementById('userEmail').textContent = '';
  }

  function showLoginError(msg) {
    const el = document.getElementById('loginError');
    el.textContent = msg; el.classList.add('show');
  }
  function hideLoginError() {
    document.getElementById('loginError').classList.remove('show');
  }

  function showPanel(email) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('auditPanel').style.display = 'flex';
    document.getElementById('btnLogout').style.display = 'inline-block';
    document.getElementById('userEmail').textContent = email;
    loadRecords();
  }

  // ── 加载数据 ──
  async function loadRecords() {
    document.getElementById('tableLoading').style.display = 'block';
    document.getElementById('dataTable').style.display = 'none';
    document.getElementById('tableEmpty').style.display = 'none';
    document.getElementById('recordCount').textContent = '加载中…';

    // 同时拉审计记录 + 关联的申请记录（姓名）
    const { data: edits, error } = await db
      .from(currentTable)
      .select(`*, ${currentSubTable}(student_name_cn, student_name_en)`)
      .order('edited_at', { ascending: false });

    document.getElementById('tableLoading').style.display = 'none';

    if (error) {
      document.getElementById('tableEmpty').textContent = '加载失败：' + error.message;
      document.getElementById('tableEmpty').style.display = 'block';
      return;
    }

    allRecords = edits || [];
    populateFilters();
    applyFilters();
    document.getElementById('dataTable').style.display = 'table';
  }

  function populateFilters() {
    // 字段筛选
    const fields = [...new Set(allRecords.map(r => r.field).filter(Boolean))].sort();
    const fSel = document.getElementById('filterField');
    fSel.innerHTML = '<option value="">全部字段</option>';
    fields.forEach(f => {
      const opt = document.createElement('option');
      opt.value = f;
      opt.textContent = FIELD_LABELS[f] || f;
      fSel.appendChild(opt);
    });

    // 操作者筛选
    const editors = [...new Set(allRecords.map(r => r.edited_by).filter(Boolean))].sort();
    const eSel = document.getElementById('filterEditor');
    eSel.innerHTML = '<option value="">全部操作者</option>';
    editors.forEach(e => {
      const opt = document.createElement('option');
      opt.value = e;
      opt.textContent = e;
      eSel.appendChild(opt);
    });
  }

  function applyFilters() {
    const field  = document.getElementById('filterField').value;
    const editor = document.getElementById('filterEditor').value;
    const search = document.getElementById('filterSearch').value.toLowerCase();

    let filtered = allRecords.filter(r => {
      if (field  && r.field      !== field)  return false;
      if (editor && r.edited_by  !== editor) return false;
      if (search) {
        const hay = [
          r.record_id, r.field, r.old_value, r.new_value, r.edited_by,
          r.admissions_submissions?.student_name_cn,
          r.admissions_submissions?.student_name_en,
        ].join(' ').toLowerCase();
        if (!hay.includes(search)) return false;
      }
      return true;
    });

    renderTable(filtered);
    document.getElementById('recordCount').textContent =
      `共 ${allRecords.length} 条记录，显示 ${filtered.length} 条`;
  }

  function renderTable(records) {
    const tbody = document.getElementById('tableBody');
    const empty = document.getElementById('tableEmpty');

    if (!records.length) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
      empty.textContent = '暂无记录';
      return;
    }
    empty.style.display = 'none';

    tbody.innerHTML = records.map(r => {
      const time = r.edited_at
        ? new Date(r.edited_at).toLocaleString('zh-CN', {
            timeZone: 'America/New_York',
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', second: '2-digit'
          })
        : '—';

      const fieldLabel = FIELD_LABELS[r.field] || r.field || '—';
      const oldVal = r.old_value != null
        ? `<span class="val-old">${escHtml(r.old_value)}</span>`
        : `<span class="val-null">（空）</span>`;
      const newVal = r.new_value != null
        ? `<span class="val-new">${escHtml(r.new_value)}</span>`
        : `<span class="val-null">（空）</span>`;

      const sub = r[currentSubTable] || r['admissions_submissions'] || r['admissions_submissionsMulti'];
      const name = sub
        ? (sub.student_name_cn || sub.student_name_en || '—')
        : '—';

      const shortId = r.record_id ? r.record_id.slice(0, 8) + '…' : '—';

      return `<tr>
        <td class="time-cell">${time}</td>
        <td class="editor-cell">${escHtml(r.edited_by || '—')}</td>
        <td><span class="field-badge">${escHtml(fieldLabel)}</span></td>
        <td style="white-space:nowrap;">${oldVal}<span class="arrow">→</span>${newVal}</td>
        <td style="font-weight:600;">${escHtml(name)}</td>
        <td class="record-cell" title="${r.record_id || ''}">${shortId}</td>
      </tr>`;
    }).join('');
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  init();
</script>
</body>
</html>
