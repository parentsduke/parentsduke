<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>扯谈群助手 · 扯谈Duke家长群</title>

<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0A2240">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="扯谈助手">
<link rel="apple-touch-icon" href="/icons/chetan-icon-192.png">
<link rel="icon" href="/icons/chetan-icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'SIMLI';
    src: url('/fonts/SIMLI.woff2') format('woff2');
    font-display: swap;
  }
  @font-face {
    font-family: 'NotoSansBold';
    src: url('/fonts/NotoSans-Bold-BF.woff2') format('woff2');
    font-display: swap;
  }
  :root{
    --paper:#F6F1E7;
    --ink:#2B2620;
    --navy:#0A2240;
    --gold:#C8A35A;
    --bubble-bot:#FFFFFF;
    --bubble-user:#0A2240;
    --border:#E3DACB;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{
    font-family:'Noto Sans SC', sans-serif;
    background:var(--paper);
    color:var(--ink);
    display:flex; flex-direction:column;
    height:100vh;
    height:100dvh;
    overflow:hidden;
  }

  /* ── 顶栏 ── */
  header{
    background:var(--navy);
    color:#fff;
    padding:14px 18px;
    display:flex; align-items:center; gap:12px;
    box-shadow:0 2px 8px rgba(10,34,64,.15);
    flex-shrink:0;
  }
  .avatar{
    width:40px; height:40px; border-radius:50%;
    background:var(--gold);
    display:flex; align-items:center; justify-content:center;
    font-size:20px; flex-shrink:0;
  }
  header .title{
    font-family:'SIMLI', 'Noto Serif SC', serif;
    font-size:19px; font-weight:400; letter-spacing:2px;
  }
  header .subtitle{
    font-size:11px; opacity:.65; margin-top:2px;
  }

  /* ── 消息区 ── */
  #chat{
    flex:1 1 auto;
    min-height:0;
    overflow-y:auto;
    padding:16px;
    display:flex; flex-direction:column; gap:12px;
  }
  .msg{
    max-width:78%;
    padding:10px 14px;
    border-radius:14px;
    font-size:14.5px;
    line-height:1.6;
    white-space:pre-wrap;
    word-break:break-word;
    box-shadow:0 1px 2px rgba(0,0,0,.04);
  }
  .msg.bot{
    align-self:flex-start;
    background:var(--bubble-bot);
    border:1px solid var(--border);
    border-top-left-radius:4px;
  }
  .msg.user{
    align-self:flex-end;
    background:var(--bubble-user);
    color:#fff;
    border-top-right-radius:4px;
  }
  .msg.bot::before{
    content:"扯谈群助手";
    display:block;
    font-size:11px;
    font-weight:700;
    color:var(--gold);
    margin-bottom:4px;
    letter-spacing:1px;
  }
  .msg.typing{
    color:#999; font-style:italic;
  }
  .msg.error{
    background:#fdecea; color:#b3261e; border:1px solid #f5c2bd;
  }

  /* ── 输入栏 ── */
  #inputBar{
    flex:0 0 auto;
    display:flex; gap:8px;
    padding:10px 12px;
    padding-bottom:max(10px, env(safe-area-inset-bottom));
    background:#fff;
    border-top:1px solid var(--border);
  }
  #inputBar textarea{
    flex:1;
    resize:none;
    border:1px solid var(--border);
    border-radius:18px;
    padding:10px 16px;
    font-size:14.5px;
    font-family:inherit;
    line-height:1.4;
    max-height:96px;
    outline:none;
  }
  #inputBar textarea:focus{ border-color:var(--gold); }
  #sendBtn{
    flex-shrink:0;
    width:44px; height:44px;
    border-radius:50%;
    border:none;
    background:var(--navy);
    color:#fff;
    font-size:18px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:opacity .15s;
  }
  #sendBtn:disabled{ opacity:.4; cursor:default; }

  /* ── 滚动条 ── */
  #chat::-webkit-scrollbar{ width:4px; }
  #chat::-webkit-scrollbar-thumb{ background:var(--border); border-radius:2px; }

  /* ── 安装提示横幅 ── */
  #installBanner{
    display:none;
    align-items:center;
    gap:10px;
    background:var(--gold);
    color:var(--navy);
    font-size:13px;
    padding:10px 14px;
    line-height:1.4;
  }
  #installBanner span{ flex:1; }
  #installBanner button{
    background:var(--navy);
    color:#fff;
    border:none;
    border-radius:6px;
    padding:5px 10px;
    font-size:12px;
    cursor:pointer;
    white-space:nowrap;
  }
  #installBanner .close-btn{
    background:none;
    color:var(--navy);
    font-size:16px;
    padding:0 4px;
  }
</style>
</head>
<body>

<div id="installBanner">
  <span id="installText"></span>
  <button id="installActionBtn" style="display:none"></button>
  <button class="close-btn" onclick="document.getElementById('installBanner').style.display='none'">✕</button>
</div>

<header>
  <div>
    <div class="title">扯谈<span style="font-family:'NotoSansBold',sans-serif;font-weight:bold;display:inline-block;transform:scaleY(0.68);transform-origin:bottom;">GPT</span></div>
    <div class="subtitle">扯谈Duke家长群 · 扯谈群助手在线</div>
  </div>
</header>

<div id="chat"></div>

<div id="inputBar">
  <textarea id="input" rows="1" placeholder="与扯谈群助手聊天" onkeydown="onKeyDown(event)" oninput="autoGrow(this)"></textarea>
  <button id="sendBtn" onclick="send()">➤</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://ritglkwqpwlcjwemhfqd.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJpdGdsa3dxcHdsY2p3ZW1oZnFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MzEyMTQsImV4cCI6MjA4NzMwNzIxNH0.TqjETAEGcWTd2CbvkMnmfm6bKHLtZHjXbsy3dtPuEB8';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const PROXY_URL = 'https://ritglkwqpwlcjwemhfqd.supabase.co/functions/v1/ai-proxy';

// ── 人设 system prompt ──
const SYSTEM_PROMPT = `你是"扯谈Duke家长群"的群助手，熟悉Duke 2030届各种事务。

规则：
- 始终用中文回复
- 直接回答问题，不加任何开场白、感叹词、语气词（不要"哎呀""哈哈""好的""当然""真的嘛""说句实话"等）
- 回复简短精炼，三五句话能说清楚的绝不说十句，不重复，不废话
- 涉及Duke动态、日期、政策等，以已知信息作答，不要凭猜测
- 不讨论政治、宗教、色情、暴力等敏感话题，遇到此类问题直接跳过
- 回答前先搜索查询最新信息，不要凭记忆猜测，尤其是涉及Duke最新动态、日期、政策等`;

let history = []; // {role:'user'|'model', text}

function autoGrow(el){
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 96) + 'px';
}

function onKeyDown(e){
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

function appendMsg(role, text){
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function ask(text){
  document.getElementById('input').value = text;
  send();
}

let _sending = false;
async function send(){
  if (_sending) return;
  _sending = true;
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  appendMsg('user', text);
  input.value = '';
  autoGrow(input);

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;

  const typingEl = appendMsg('bot typing', '扯谈群助手正在码字…');

  try {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.pathname);
      return;
    }

    // 拼接历史对话为单一prompt（ai-proxy当前只支持单条prompt）
    let fullPrompt = SYSTEM_PROMPT + '\n\n以下是对话记录：\n';
    for (const h of history) {
      fullPrompt += (h.role === 'user' ? '家长' : '扯谈群助手') + '：' + h.text + '\n';
    }
    fullPrompt += '家长：' + text + '\n扯谈群助手：';

    const PROVIDERS = [
      { provider: 'gemini',     useSearch: true  },
      { provider: 'gemini-lite', useSearch: true  },
      { provider: 'groq',       useSearch: false },
      { provider: 'cerebras',   useSearch: false },
      { provider: 'mistral',    useSearch: false },
      { provider: 'claude',     useSearch: false },  // OpenRouter免费Claude
      { provider: 'chatgpt',    useSearch: false },  // OpenRouter免费模型
      { provider: 'openrouter', useSearch: false },
    ];

    let result = null, lastErr = null;
    for (const p of PROVIDERS) {
      try {
        const res = await fetch(PROXY_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
          body: JSON.stringify({ provider: p.provider, prompt: fullPrompt, useSearch: p.useSearch, chat: true })
        });
        const d = await res.json();
        if (!d.ok) throw new Error(d.error || '请求失败');
        result = d.result.trim();
        break;
      } catch(err) {
        lastErr = err;
        console.warn(`[${p.provider}] 失败，尝试下一个：`, err.message);
      }
    }
    if (result === null) throw lastErr || new Error('所有provider均失败');

    typingEl.remove();
    appendMsg('bot', result);

    history.push({ role:'user', text });
    history.push({ role:'model', text: result });
    // 限制历史长度，避免prompt过长
    if (history.length > 20) history = history.slice(-20);

  } catch(e) {
    typingEl.remove();
    appendMsg('bot error', '❌ 出错了：' + e.message);
  } finally {
    _sending = false;
    btn.disabled = false;
    input.focus();
  }
}

// ── 注册 Service Worker ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/chetan-sw.js').catch(e => console.warn('SW注册失败', e));
  });
}
</script>
</body>
</html>
<script>
// ── 安装提示横幅 ──
(function(){
  const banner = document.getElementById('installBanner');
  const text   = document.getElementById('installText');
  const btn    = document.getElementById('installActionBtn');
  const ua     = navigator.userAgent;
  const isIOS  = /iphone|ipad|ipod/i.test(ua);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
  if (isStandalone) return;
  if (isIOS) {
    text.textContent = '点击底部 分享 按钮 → "添加到主屏幕"，即可像App一样使用扯谈GPT';
    banner.style.display = 'flex';
  } else {
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      text.textContent = '安装扯谈GPT到主屏幕，随时快速打开';
      btn.textContent = '安装';
      btn.style.display = 'inline-block';
      btn.onclick = () => { deferredPrompt.prompt(); banner.style.display='none'; };
      banner.style.display = 'flex';
    });
    setTimeout(() => {
      if (!deferredPrompt && banner.style.display === 'none') {
        text.textContent = '点击浏览器菜单 → "添加到主屏幕"，即可像App一样使用扯谈GPT';
        banner.style.display = 'flex';
      }
    }, 1200);
  }
})();
</script>
