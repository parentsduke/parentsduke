Duke 2026-2027 学费与缴费指南

【一、学费总览（2026-27学年，已由Board of Trustees批准）】
- 学费(Tuition)：$73,740/年（较上年涨幅4.95%）
- 住宿、餐饮等分项金额：Bursar's Office截至2026年6月尚未公布，预计6-7月随秋季账单同步发布
- 本科生全年总费用（未扣助学金）估计约$103,400/年（含学费、住宿、餐饮、书本、个人开支）
- 已获need-based助学金的学生：学费涨幅已自动纳入原资助方案，无需单独申请调整

【二、缴费截止日期（2026-27，预计）】
- 秋季账单：2026年6月29日出账，截止日2026年8月1日
- 春季账单：2026年11月23日出账，截止日2027年1月第四个工作日
- 账单通过DukeHub电子送达，同时发送至Duke邮箱；给家长看账单须学生先开通Guest Access
- 逾期后果：可能产生滞纳金，影响选课、成绩单申请及毕业认证
- 查看账单：登录 DukeHub → Finances → Make a Payment

【三、缴费方式】

▶ 支付宝留学缴费（国内家长首推）
- 无需通过Flywire等第三方，直接付至学校收款账户
- 凭录取通知书+缴费通知书，不占用付款人年度5万美元便利化购汇额度
- 要求：付款人须持中国大陆居民身份证实名认证的支付宝账户
- 操作：支付宝首页 → 搜索"留学缴费" → 选学校 → 填金额 → 上传证明材料（录取通知书+缴费通知书，JPG/PNG，≤10MB）
- 注意：付款人须为中国大陆境内居民；外籍学生（无中国身份证）建议提前致电支付宝客服确认

▶ 招商银行"留学快汇"
- 招行App内置，一键缴学费，覆盖全球2000多所学校
- 凭录取通知书+学费账单，不占用5万美元便利化额度
- 要求：付款人持中国大陆居民身份证实名认证的招行账户；家长代办须提供近亲属关系证明（户口本）
- 操作：招行App → 搜索"留学快汇" → 选学校 → 填金额 → 上传缴费证明材料

▶ 云闪付留学缴费
- 绑定任意银联卡即可，全程中文操作，由易思汇提供技术支持
- 操作：云闪付App → 搜索"留学缴费"或进入"海外服务"板块

▶ 微信"腾讯留学缴费"小程序
- 微信搜索小程序"腾讯留学缴费"，底层由易思汇提供服务

▶ 易思汇（eSunding）
- 腾讯/新东方/IDG投资，历史交易量超500亿元，支持国内几乎所有主流银行网银

▶ DukeHub直付（美国境内）
- DukeHub → Student Center → Finances → Make a Payment
- 支持美国银行ACH转账（免手续费）

▶ Flywire / Convera（国际电汇）
- DukeHub → Student Center → Finances → Make a Payment → International Payment
- 两者均提供中文客服；付款后超过7个工作日未更新可联系客服查询

▶ 分期付款计划（Nelnet Payment Plan）
- Duke与Nelnet合作，每学期账单分5期月付，无需一次性支付全款
- 报名费：$45/学期（不退款）
- 扣款方式：仅限美国储蓄账户自动扣款（ACH），不支持信用卡
- 须由学生本人登录DukeHub操作，家长Guest Access账户无法直接创建计划（学生报名后可添加家长为授权付款人）
- 秋季计划：2026年6月1日起开放，扣款日7/1、8/1、9/1、10/1、11/1（共5期）
- 春季计划：2026年11月1日起开放，扣款日12/1、1/1、2/1、3/1、4/1（共5期）
- 无利息，每学期仅收$45报名费；扣款失败最高罚$30/次；逾期滞纳金为逾期余额的1.25%
- 详情：mycollegepaymentplan.com/duke 或致电(800) 609-8056

const SYSTEM_PROMPT_NO_SEARCH = SYSTEM_PROMPT + `\n\n【重要】你没有联网能力。以上知识库之外的时效性问题（最新新闻、实时活动、具体课程安排等），请直接告知用户去官网查询，不要猜测或编造。`;

// ── 对话管理 ──
// conversations: [{id, title, date, messages:[{role,text}]}]
let conversations = [];
let currentId = null;
let history = [];

function loadStorage() {
  try {
    conversations = JSON.parse(localStorage.getItem('chetan_convs') || '[]');
  } catch(e) { conversations = []; }
}

function saveStorage() {
  try {
    localStorage.setItem('chetan_convs', JSON.stringify(conversations));
  } catch(e) {}
}

function getCurrentConv() {
  return conversations.find(c => c.id === currentId);
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

function newChat() {
  const id = genId();
  conversations.unshift({ id, title:'新对话', date: new Date().toLocaleDateString('zh-CN',{month:'numeric',day:'numeric'}), messages:[] });
  saveStorage();
  switchConv(id);
  closeSidebar();
  document.getElementById('input').focus();
}

function switchConv(id) {
  currentId = id;
  history = [];
  const conv = getCurrentConv();
  if (conv) history = [...conv.messages];
  renderChat();
  renderSidebar();
}

function deleteConv(id, e) {
  e.stopPropagation();
  conversations = conversations.filter(c => c.id !== id);
  saveStorage();
  if (currentId === id) {
    if (conversations.length > 0) switchConv(conversations[0].id);
    else newChat();
  } else {
    renderSidebar();
  }
}

function renderChat() {
  const chat = document.getElementById('chat');
  chat.innerHTML = '';
  for (const h of history) {
    const div = document.createElement('div');
    div.className = 'msg ' + (h.role === 'user' ? 'user' : 'bot');
    div.textContent = h.text;
    chat.appendChild(div);
  }
  chat.scrollTop = chat.scrollHeight;
}

function renderSidebar() {
  const list = document.getElementById('convList');
  list.innerHTML = '';
  for (const c of conversations) {
    const item = document.createElement('div');
    item.className = 'conv-item' + (c.id === currentId ? ' active' : '');
    item.innerHTML = `<span class="conv-title">${c.title}</span><span class="conv-date">${c.date}</span><button class="del-btn" title="删除">🗑</button>`;
    item.querySelector('.del-btn').onclick = (e) => deleteConv(c.id, e);
    item.onclick = () => { switchConv(c.id); closeSidebar(); };
    list.appendChild(item);
  }
}

function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ── UI ──
function autoGrow(el){
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 96) + 'px';
}
function onKeyDown(e){
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}
function appendMsg(role, text){
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function matchCalendar(text) {
  const keywords = /日历|校历|学术日历|开学|放假|秋假|春假|感恩节|毕业典礼|毕业|graduation|commencement|期末考试|考试时间|选课|注册时间|move.?in|orientation|convocation|fall break|spring break|thanksgiving|academic calendar|什么时候开学|什么时候放假/i;
  return keywords.test(text);
}

async function send(){
  if (_sending) return;
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  _sending = true;
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;

  let typingEl = null;
  try {
    appendMsg('user', text);
    input.value = '';
    autoGrow(input);
    typingEl = appendMsg('bot typing', '扯谈群助手正在码字…');

    // 日历关键词匹配：直接返回硬编码，不走AI
    if (matchCalendar(text)) {
      typingEl.remove();
      const answer = CALENDAR_ANSWER;
      appendMsg('bot', answer);
      history.push({role:'user', text});
      history.push({role:'bot', text: answer});
      saveStorage();
      return;
    }

    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.pathname);
      return;
    }

    const buildPrompt = (useSearch) => {
      let p = (useSearch ? SYSTEM_PROMPT : SYSTEM_PROMPT_NO_SEARCH) + '\n\n以下是对话记录：\n';
      for (const h of history) {
        p += (h.role === 'user' ? '家长' : '扯谈群助手') + '：' + h.text + '\n';
      }
      p += '家长：' + text + '\n扯谈群助手：';
      return p;
    };

    const PROVIDERS = [
      { provider:'gemini',     useSearch:true  },
      { provider:'gemini-lite',useSearch:true  },
      { provider:'groq',       useSearch:false },
      { provider:'nvidia',     useSearch:false },
      { provider:'cerebras',   useSearch:false },
      { provider:'mistral',    useSearch:false },
      { provider:'claude',     useSearch:false },
      { provider:'chatgpt',    useSearch:false },
      { provider:'openrouter', useSearch:false },
    ];

    let result = null, lastErr = null;
    for (const p of PROVIDERS) {
      try {
        const res = await fetch(PROXY_URL, {
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':`Bearer ${session.access_token}`},
          body:JSON.stringify({provider:p.provider, prompt:buildPrompt(p.useSearch), useSearch:p.useSearch, chat:true})
        });
        const d = await res.json();
        if (!d.ok) throw new Error(d.error || '请求失败');
        result = d.result.trim();
        if (!result) throw new Error('空响应');
        break;
      } catch(err) {
        lastErr = err;
        console.warn(`[${p.provider}] 失败：`, err.message);
      }
    }
    if (result === null) throw lastErr || new Error('所有provider均失败');

    typingEl.remove();
    appendMsg('bot', result);

    history.push({ role:'user', text });
    history.push({ role:'model', text: result });
    if (history.length > 40) history = history.slice(-40);

    // 更新当前对话
    const conv = getCurrentConv();
    if (conv) {
      conv.messages = [...history];
      // 用第一条用户消息作标题
      if (conv.title === '新对话') conv.title = text.slice(0, 18);
      saveStorage();
      renderSidebar();
    }

  } catch(e) {
    if (typingEl) typingEl.remove();
    appendMsg('bot error', '❌ 出错了：' + e.message);
  } finally {
    _sending = false;
    btn.disabled = false;
    input.focus();
  }
}

  const isIOS  = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
  if (isStandalone) return;
  if (isIOS) {
    text.textContent = '点击底部 分享 按钮 → "添加到主屏幕"，即可像App一样使用扯谈GPT';
    banner.style.display = 'flex';
  } else {
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault(); deferredPrompt = e;
      text.textContent = '安装扯谈GPT到主屏幕，随时快速打开';
      btn.textContent = '安装'; btn.style.display = 'inline-block';
      btn.onclick = () => { deferredPrompt.prompt(); banner.style.display='none'; };
      banner.style.display = 'flex';
    });
    setTimeout(() => {
      if (!deferredPrompt && banner.style.display === 'none') {
        text.textContent = '点击浏览器菜单 → "添加到主屏幕"，即可像App一样使用扯谈GPT';
        banner.style.display = 'flex';
      }
    }, 1200);
  }
})();
</script>
</body>
</html>
