<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Duke Parents</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0f2044;
    --navy-light: #1a3260;
    --gold: #c9a84c;
    --cream: #faf7f2;
    --text: #1a1a2e;
    --muted: #7a7a8c;
    --error: #c0392b;
    --success: #1e7e50;
    --border: #ddd5c0;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }

  .form-wrap {
    width: 100%;
    max-width: 380px;
  }

  .brand-logo {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 40px;
  }

  .brand-emblem {
    width: 48px; height: 48px;
    border: 2px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: var(--gold);
  }

  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--navy);
    line-height: 1.2;
  }

  .brand-name span {
    display: block;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 300;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .form-heading {
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    color: var(--navy);
    margin-bottom: 6px;
  }

  .form-sub { font-size: 14px; color: var(--muted); margin-bottom: 32px; }

  .field { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--navy);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    padding: 13px 16px;
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus {
    border-color: var(--navy);
    box-shadow: 0 0 0 3px rgba(15,32,68,0.08);
  }

  .strength-wrap { margin-top: 8px; }
  .strength-bar { height: 3px; border-radius: 2px; background: var(--border); overflow: hidden; }
  .strength-fill { height: 100%; width: 0%; border-radius: 2px; transition: width 0.3s, background 0.3s; }
  .strength-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .btn {
    width: 100%;
    padding: 15px;
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
    margin-top: 8px;
  }

  .btn::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: var(--gold);
    transform: scaleX(0);
    transition: transform 0.25s;
    transform-origin: left;
  }

  .btn:hover:not(:disabled)::after { transform: scaleX(1); }
  .btn:hover:not(:disabled) {
    background: var(--navy-light);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(15,32,68,0.2);
  }

  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-inner { display: flex; align-items: center; justify-content: center; gap: 10px; }

  .spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .loading .spinner { display: block; }
  .loading .btn-text { display: none; }

  .message {
    margin-top: 16px;
    padding: 12px 15px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.5;
    display: none;
    border-left: 3px solid;
  }

  .message.error { display: block; background: #fdf0ef; border-color: var(--error); color: var(--error); }
  .message.success { display: block; background: #edf7f2; border-color: var(--success); color: var(--success); }

  .signin { text-align: center; font-size: 14px; color: var(--muted); margin-top: 24px; }
  .signin a {
    color: var(--navy);
    text-decoration: none;
    font-weight: 500;
    border-bottom: 1px solid var(--gold);
    padding-bottom: 1px;
    transition: color 0.2s;
  }
  .signin a:hover { color: var(--gold); }
</style>
</head>
<body>

<div class="form-wrap">
  <div class="brand-logo">
    <div class="brand-emblem">♦</div>
    <div class="brand-name">
      Duke Parents
      <span>Community Portal</span>
    </div>
  </div>

  <h1 class="form-heading">Reset Password</h1>
  <p class="form-sub">Enter your new password below</p>

  <form id="resetForm">
    <div class="field">
      <label for="password">New Password</label>
      <input type="password" id="password" placeholder="At least 8 characters" required />
      <div class="strength-wrap">
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>
    </div>

    <div class="field">
      <label for="confirmPassword">Confirm New Password</label>
      <input type="password" id="confirmPassword" placeholder="Re-enter your password" required />
    </div>

    <button type="submit" class="btn" id="resetBtn">
      <div class="btn-inner">
        <span class="btn-text">Update Password</span>
        <div class="spinner"></div>
      </div>
    </button>
  </form>

  <div class="message" id="message"></div>

  <div class="signin"><a href="login.html">← Back to Sign In</a></div>
</div>

<script>
  const SUPABASE_URL      = 'https://ritglkwqpwlcjwemhfqd.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJpdGdsa3dxcHdsY2p3ZW1oZnFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MzEyMTQsImV4cCI6MjA4NzMwNzIxNH0.TqjETAEGcWTd2CbvkMnmfm6bKHLtZHjXbsy3dtPuEB8';

  const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const form  = document.getElementById('resetForm');
  const btn   = document.getElementById('resetBtn');
  const msgEl = document.getElementById('message');
  const pwdEl = document.getElementById('password');

  // Password strength meter
  pwdEl.addEventListener('input', () => {
    const val = pwdEl.value;
    const fill  = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    let strength = 0;
    if (val.length >= 8) strength++;
    if (/[A-Z]/.test(val)) strength++;
    if (/[0-9]/.test(val)) strength++;
    if (/[^A-Za-z0-9]/.test(val)) strength++;

    const levels = [
      { pct: '0%',   color: '',        text: '' },
      { pct: '25%',  color: '#e74c3c', text: 'Weak' },
      { pct: '50%',  color: '#e67e22', text: 'Fair' },
      { pct: '75%',  color: '#f1c40f', text: 'Good' },
      { pct: '100%', color: '#1e7e50', text: 'Strong' },
    ];

    fill.style.width      = levels[strength].pct;
    fill.style.background = levels[strength].color;
    label.textContent     = val.length ? levels[strength].text : '';
  });

  function showMsg(text, type) { msgEl.textContent = text; msgEl.className = `message ${type}`; }
  function setLoading(on) { btn.disabled = on; btn.classList.toggle('loading', on); }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    msgEl.className = 'message';

    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirmPassword').value;

    if (password !== confirm) {
      showMsg('Passwords do not match.', 'error');
      return;
    }

    if (password.length < 8) {
      showMsg('Password must be at least 8 characters.', 'error');
      return;
    }

    setLoading(true);
    try {
      const { error } = await client.auth.updateUser({ password });
      if (error) throw error;

      showMsg('Password updated successfully! Redirecting to sign in...', 'success');
      form.reset();
      setTimeout(() => { window.location.href = 'login.html'; }, 2000);

    } catch (err) {
      showMsg(err.message || 'Something went wrong. Please try again.', 'error');
    } finally {
      setLoading(false);
    }
  });
</script>
</body>
</html>
