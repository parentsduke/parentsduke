<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扯谈Duke群 海报</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'SIMLI';
    src: url('https://cdn.jsdelivr.net/gh/parentsduke/parentsduke@main/fonts/SIMLI.woff2') format('woff2'),
         url('https://cdn.jsdelivr.net/gh/parentsduke/parentsduke@main/fonts/SIMLI.TTF') format('truetype');
    font-weight: normal;
    font-style: normal;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: SIMLI, serif;
    padding: 20px;
    overflow-x: hidden;
    width: 100%;
  }

  .poster {
    width: 600px;
    max-width: 100%;
    min-height: 850px;
    height: auto;
    background: #012169;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  @media (max-width: 768px) {
    .poster {
      width: 100%;
      min-height: 765px;
      padding: 36px 16px;
    }
    .gothic-title { font-size: 52px; }
    .slogan-main { margin-bottom: 36px; }
    .divider { margin-bottom: 36px; }
    .divider3 { margin: 36px auto 22px; }
    .cn-title { margin-bottom: 43px; }
  }

  /* 背景纹理 */
  .poster::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 20%, rgba(201,168,76,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 20% 80%, rgba(1,33,105,0.6) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 70%, rgba(201,168,76,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  /* 金色边框 */
  .border-outer {
    position: absolute;
    inset: 18px;
    border: 1px solid rgba(201,168,76,0.35);
    pointer-events: none;
  }
  .border-inner {
    position: absolute;
    inset: 24px;
    border: 1px solid rgba(201,168,76,0.15);
    pointer-events: none;
  }

  /* 角装饰 */
  .corner {
    position: absolute;
    width: 28px;
    height: 28px;
    border-color: #c9a84c;
    border-style: solid;
  }
  .corner.tl { top: 14px; left: 14px; border-width: 2px 0 0 2px; }
  .corner.tr { top: 14px; right: 14px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 14px; left: 14px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 14px; right: 14px; border-width: 0 2px 2px 0; }

  /* 顶部装饰线 */
  .deco-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 32px;
    animation: fadeUp 1s ease both;
    width: 100%;
  }
  .deco-line::before,
  .deco-line::after {
    content: '';
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c9a84c, transparent);
  }
  .deco-diamond {
    width: 6px;
    height: 6px;
    background: #c9a84c;
    transform: rotate(45deg);
  }

  /* 主标题 */
  .site-label {
    font-family: 'IM Fell English SC', serif;
    font-size: 24px;
    letter-spacing: 0.15em;
    color: rgba(201,168,76,0.92);
    text-transform: uppercase;
    margin-bottom: 16px;
    animation: fadeUp 1s 0.1s ease both;
    text-align: center;
    width: 100%;
    padding: 0 8px;
    white-space: normal;
    word-break: break-word;
    line-height: 1.4;
  }

  .gothic-title {
    font-family: 'IM Fell English SC', serif;
    font-size: 64px;
    color: #ffffff;
    letter-spacing: 0.05em;
    line-height: 1;
    margin-bottom: 6px;
    -webkit-text-stroke: 1.5px #012169;
    text-shadow: 0 0 40px rgba(255,255,255,0.15);
    animation: fadeUp 1s 0.2s ease both;
    text-align: center;
    white-space: nowrap;
  }

  .cn-title {
    font-size: 32px;
    font-family: SIMLI, serif;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.15em;
    margin-bottom: 48px;
    animation: fadeUp 1s 0.3s ease both;
    text-align: center;
    width: 100%;
    padding: 0 0.15em;
    white-space: nowrap;
  }

  /* 主广告语 */
  .divider {
    width: min(280px, 80%);
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.5), transparent);
    margin-bottom: 40px;
    animation: fadeUp 1s 0.4s ease both;
  }

  .slogan-main {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeUp 1s 0.5s ease both;
    width: 100%;
  }

  .slogan-main .line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .slogan-main .line:last-child { margin-bottom: 0; }

  .slogan-dot {
    width: 4px;
    height: 4px;
    background: #c9a84c;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .slogan-main .zh {
    font-size: 28px;
    font-weight: 700;
    font-family: SIMLI, serif;
    color: rgba(201,168,76,0.9);
    letter-spacing: 0.1em;
    white-space: nowrap;
    padding-right: 0.1em;
  }

  .slogan-main .zh em {
    font-style: normal;
    color: rgba(201,168,76,0.9);
  }

  /* 副广告语 */
  .divider2 {
    width: min(180px, 60%);
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
    margin-bottom: 32px;
    animation: fadeUp 1s 0.6s ease both;
  }

  .slogan-sub {
    text-align: center;
    animation: fadeUp 1s 0.7s ease both;
  }

  .slogan-sub .row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    margin-bottom: 10px;
  }

  .slogan-sub .row:last-child { margin-bottom: 0; }

  .slogan-sub .item {
    font-size: 24px;
    font-family: SIMLI, serif;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.12em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .slogan-sub .item::before {
    content: none;
  }

  /* 底部 */
  .divider3 {
    width: min(280px, 80%);
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.5), transparent);
    margin: 40px auto 24px;
    animation: fadeUp 1s 0.8s ease both;
  }

  .footer-text {
    font-size: 28px;
    letter-spacing: 0.15em;
    color: rgba(201,168,76,0.92);
    text-transform: uppercase;
    animation: fadeUp 1s 0.9s ease both;
    text-align: center;
    width: 100%;
    padding: 0 0.15em;
    white-space: nowrap;
  }

  /* 背景细节——竖线 */
  .bg-lines {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    opacity: 0.04;
  }
  .bg-lines::before {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    width: 1px;
    background: #c9a84c;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* 打印/截图优化 */
  @media print {
    body { background: white; }
  }
</style>
</head>
<body>

<div class="poster">
  <div class="bg-lines"></div>
  <div class="border-outer"></div>
  <div class="border-inner"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="deco-line">
    <div class="deco-diamond"></div>
  </div>

  <div class="site-label">Duke Parents Community</div>
  <div class="gothic-title">𝔇𝔲𝔨𝔢</div>
  <div class="cn-title">扯谈群　扯谈站</div>

  <div class="divider"></div>

  <div class="slogan-main">
    <div class="line">
      <div class="zh">聊杜克&nbsp;&nbsp;&nbsp;进扯群</div>
    </div>
    <div class="line">
      <div class="zh">淘信息&nbsp;&nbsp;&nbsp;上扯站</div>
    </div>
  </div>


  <div class="divider3"></div>
  <div class="footer-text"><a href="https://dukeparents.org" target="_blank" style="color:inherit; text-decoration:none;">dukeparents<span style="letter-spacing:0">.org</span></a></div>

</div>

</body>
</html>
