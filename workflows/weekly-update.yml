name: 每周Duke动态自动更新

on:
  schedule:
    - cron: '0 12 * * 1'  # 每周一北京时间20:00（UTC 12:00）
  workflow_dispatch:       # 也可以手动触发

jobs:
  update-weekly:
    runs-on: ubuntu-latest

    steps:
      - name: 签出代码
        uses: actions/checkout@v4

      - name: 安装 Python 依赖
        run: pip install requests feedparser

      - name: 抓取新闻并生成周报
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 .github/scripts/generate_weekly.py

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "🗞️ 每周Duke动态自动更新 $(date +'%Y-%m-%d')"
          git push
